<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dessiner avec du Brouillard</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a12; 
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: sans-serif;
        }

        canvas {
            display: block;
        }

        .toolbar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(30, 30, 45, 0.7);
            padding: 8px 12px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95%;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tool-label {
            color: rgba(255,255,255,0.7);
            font-size: 11px;
        }

        #sizeSlider {
            width: 60px;
            accent-color: #00d2ff;
            cursor: pointer;
        }

        #colorPicker {
            width: 25px;
            height: 25px;
            border: none;
            border-radius: 50%;
            background: none;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }
        #colorPicker::-webkit-color-swatch-wrapper { padding: 0; }
        #colorPicker::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; }

        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #clearBtn {
            background: rgba(255, 80, 80, 0.2);
            color: white;
            border: 1px solid rgba(255, 80, 80, 0.4);
        }
        #clearBtn:active { background: rgba(255, 80, 80, 0.5); }

        #saveBtn {
            background: rgba(80, 255, 120, 0.2);
            color: white;
            border: 1px solid rgba(80, 255, 120, 0.4);
        }
        #saveBtn:active { background: rgba(80, 255, 120, 0.5); }

        #sendEmailBtn {
            background: rgba(100, 150, 255, 0.3);
            color: white;
            border: 1px solid rgba(100, 150, 255, 0.6);
        }
        #sendEmailBtn:active { background: rgba(100, 150, 255, 0.6); }
        
        #info {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            pointer-events: none;
        }

        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            text-align: center;
            max-width: 80%;
        }
        .notification.show {
            opacity: 1;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 40px;
            border-radius: 10px;
            font-size: 16px;
            z-index: 100;
            display: none;
        }
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="fogCanvas"></canvas>

    <div class="toolbar">
        <div class="tool-group">
            <span class="tool-label">Taille</span>
            <input type="range" id="sizeSlider" min="5" max="120" value="25">
        </div>
        
        <div class="tool-group">
            <span class="tool-label">Couleur</span>
            <input type="color" id="colorPicker" value="#d2e6ff">
        </div>
        
        <button id="sendEmailBtn" class="btn">📧 Envoyer Email</button>
        <button id="saveBtn" class="btn">💾 Sauvegarder</button>
        <button id="clearBtn" class="btn">🗑️ Effacer</button>
    </div>

    <div id="info">Dessine ou écris avec ton doigt ✨</div>
    <div id="notification" class="notification"></div>
    <div id="loading" class="loading">📤 Envoi en cours...</div>

    <script type="text/javascript">
        // ✅ INITIALISER EMAILJS AVEC TA CLÉ PUBLIQUE
        emailjs.init("2HSpDxAF3uZuAKH-l"); // Remplace par ta Public Key EmailJS

        const canvas = document.getElementById('fogCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        const sendEmailBtn = document.getElementById('sendEmailBtn');
        const sizeSlider = document.getElementById('sizeSlider');
        const colorPicker = document.getElementById('colorPicker');
        const notification = document.getElementById('notification');
        const loading = document.getElementById('loading');

        // ✅ CONFIGURATION EMAIL
        const SERVICE_ID = "service_ctymr5f"; // Remplace par ton Service ID
        const TEMPLATE_ID = "template_wc1x8ag"; // Remplace par ton Template ID
        const TO_EMAIL = "insim5628@gmail.com"; // Remplace par ton email de réception

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let currentSize = 25;
        let currentColorHex = '#d2e6ff';

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function applyBrushSettings() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = hexToRgba(currentColorHex, 0.35);
            ctx.shadowBlur = currentSize * 0.8;
            ctx.shadowColor = hexToRgba(currentColorHex, 0.9);
        }

        applyBrushSettings();

        sizeSlider.addEventListener('input', (e) => {
            currentSize = parseInt(e.target.value);
            applyBrushSettings();
        });

        colorPicker.addEventListener('input', (e) => {
            currentColorHex = e.target.value;
            applyBrushSettings();
        });

        function getPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function startDraw(e) {
            if (e.target !== canvas) return;
            isDrawing = true;
            const pos = getPos(e);
            [lastX, lastY] = [pos.x, pos.y];
            drawDot(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            [lastX, lastY] = [pos.x, pos.y];
        }

        function drawDot(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2);
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fill();
        }

        function endDraw() {
            isDrawing = false;
        }

        function showNotification(message) {
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function createImageBlob() {
            return new Promise((resolve) => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                
                tempCtx.fillStyle = '#0a0a12';
                tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                tempCtx.drawImage(canvas, 0, 0);
                
                tempCanvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/png');
            });
        }

        // ENVOYER PAR EMAIL
        sendEmailBtn.addEventListener('click', async () => {
            loading.classList.add('show');
            
            try {
                const blob = await createImageBlob();
                const reader = new FileReader();
                
                reader.onloadend = async function() {
                    const base64Image = reader.result.split(',')[1]; // Extraire juste la partie base64
                    
                    const templateParams = {
                        to_email: TO_EMAIL,
                        message: 'Quelqu\'un t\'a envoyé un dessin brouillard !',
                        image: base64Image,
                        image_name: `dessin-brouillard-${Date.now()}.png`
                    };
                    
                    await emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams);
                    
                    loading.classList.remove('show');
                    showNotification('✅ Email envoyé avec succès !');
                    
                    // Effacer le canvas après envoi
                    setTimeout(() => {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        applyBrushSettings();
                    }, 2000);
                };
                
                reader.readAsDataURL(blob);
                
            } catch (error) {
                loading.classList.remove('show');
                console.error('Erreur:', error);
                showNotification('❌ Erreur lors de l\'envoi');
            }
        });

        saveBtn.addEventListener('click', async () => {
            const blob = await createImageBlob();
            const dataURL = URL.createObjectURL(blob);
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().slice(0,19).replace(/:/g,'-');
            link.download = `dessin-brouillard-${timestamp}.png`;
            link.href = dataURL;
            link.click();
            
            showNotification('✅ Dessin sauvegardé !');
        });

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            applyBrushSettings();
            showNotification('🗑️ Dessin effacé');
        });

        clearBtn.addEventListener('touchstart', (e) => e.stopPropagation());
        saveBtn.addEventListener('touchstart', (e) => e.stopPropagation());
        sendEmailBtn.addEventListener('touchstart', (e) => e.stopPropagation());

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseout', endDraw);

        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', endDraw);
    </script>
</body>
</html>
