<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dessiner avec du Brouillard</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a12; 
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: sans-serif;
        }

        canvas {
            display: block;
        }

        .toolbar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(30, 30, 45, 0.7);
            padding: 8px 12px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95%;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tool-label {
            color: rgba(255,255,255,0.7);
            font-size: 11px;
        }

        #sizeSlider {
            width: 60px;
            accent-color: #00d2ff;
            cursor: pointer;
        }

        #colorPicker {
            width: 25px;
            height: 25px;
            border: none;
            border-radius: 50%;
            background: none;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }
        #colorPicker::-webkit-color-swatch-wrapper { padding: 0; }
        #colorPicker::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; }

        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        #clearBtn { background: rgba(255, 80, 80, 0.2); color: white; border: 1px solid rgba(255, 80, 80, 0.4); }
        #clearBtn:active { background: rgba(255, 80, 80, 0.5); }

        #saveBtn { background: rgba(80, 255, 120, 0.2); color: white; border: 1px solid rgba(80, 255, 120, 0.4); }
        #saveBtn:active { background: rgba(80, 255, 120, 0.5); }

        #sendEmailBtn { background: rgba(100, 150, 255, 0.3); color: white; border: 1px solid rgba(100, 150, 255, 0.6); }
        #sendEmailBtn:active { background: rgba(100, 150, 255, 0.6); }
        
        #stickerBtn { background: rgba(255, 200, 50, 0.2); color: white; border: 1px solid rgba(255, 200, 50, 0.4); }
        #stickerBtn:active { background: rgba(255, 200, 50, 0.5); }

        #galleryBtn { background: rgba(200, 100, 255, 0.2); color: white; border: 1px solid rgba(200, 100, 255, 0.4); }
        #galleryBtn:active { background: rgba(200, 100, 255, 0.5); }

        #emojiBtn { background: rgba(255, 150, 50, 0.2); color: white; border: 1px solid rgba(255, 150, 50, 0.4); }
        #emojiBtn:active { background: rgba(255, 150, 50, 0.5); }

        /* ✅ NOUVEAU : Style bouton Selfie */
        #selfieBtn { background: rgba(255, 80, 180, 0.25); color: white; border: 1px solid rgba(255, 80, 180, 0.5); }
        #selfieBtn:active { background: rgba(255, 80, 180, 0.6); }

        #info {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            pointer-events: none;
            z-index: 5;
        }

        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            text-align: center;
            max-width: 80%;
        }
        .notification.show { opacity: 1; }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 40px;
            border-radius: 10px;
            font-size: 16px;
            z-index: 100;
            display: none;
        }
        .loading.show { display: block; }

        /* --- STYLE DU MENU AUTOCOLLANTS --- */
        #stickerPanel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 30, 0.95);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 15px;
            z-index: 50;
            transform: translateY(110%);
            transition: transform 0.3s ease-out;
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        #stickerPanel.open {
            transform: translateY(0);
        }

        .sticker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: white;
        }
        .sticker-header h3 { margin: 0; font-size: 16px; }
        .close-stickers {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-height: 40vh;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .sticker-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            overflow: hidden;
            position: relative;
        }
        .sticker-item:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.2);
        }
        .sticker-item img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            pointer-events: none;
        }

        #emojiPanel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 30, 0.95);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 15px;
            z-index: 50;
            transform: translateY(110%);
            transition: transform 0.3s ease-out;
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        #emojiPanel.open {
            transform: translateY(0);
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            max-height: 45vh;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .emoji-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 32px;
            transition: transform 0.2s, background 0.2s;
        }
        .emoji-item:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.2);
        }

        .sticker-size-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: white;
            font-size: 12px;
        }
        .sticker-size-control input[type="range"] {
            flex: 1;
            accent-color: #ff9933;
        }

        /* ============================================================
           ✅ NOUVEAU : OVERLAY APPAREIL PHOTO (SELFIE)
           - Plein écran
           - Video en direct
           - Boutons : fermer, switch caméra, capturer
           - Preview après capture avec boutons : refaire, valider
           ============================================================ */
        #cameraOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #cameraOverlay.show {
            display: flex;
        }

        #cameraVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ✅ NOUVEAU : Flash blanc lors de la capture */
        #cameraFlash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 202;
            transition: opacity 0.3s;
        }
        #cameraFlash.flash {
            opacity: 1;
        }

        /* ✅ NOUVEAU : Preview de la photo capturée */
        #cameraPreview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            z-index: 201;
            background: black;
        }

        /* ✅ NOUVEAU : Barre supérieure de la caméra */
        .camera-top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            padding-top: max(15px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 203;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .camera-close-btn {
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .camera-title {
            color: white;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 15px;
        }

        .camera-switch-btn {
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ✅ NOUVEAU : Barre inférieure de la caméra */
        .camera-bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            z-index: 203;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
        }

        /* ✅ NOUVEAU : Gros bouton capture (style iOS) */
        .capture-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: white;
            border: 5px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 0 4px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .capture-btn:active {
            transform: scale(0.9);
        }

        /* ✅ NOUVEAU : Boutons de validation après capture */
        .camera-confirm-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
            display: none;
            justify-content: space-around;
            align-items: center;
            z-index: 203;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
        }
        .camera-confirm-bar.show {
            display: flex;
        }

        .camera-action-btn {
            background: rgba(0,0,0,0.5);
            border: 2px solid white;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .camera-action-btn.primary {
            background: white;
            color: black;
        }

        /* ✅ NOUVEAU : Message d'erreur caméra */
        .camera-error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            padding: 20px;
            display: none;
            z-index: 204;
            max-width: 80%;
        }
        .camera-error.show {
            display: block;
        }
        .camera-error h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }
        .camera-error p {
            margin: 0 0 15px 0;
            opacity: 0.7;
            font-size: 13px;
        }
        .camera-error button {
            background: white;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>

        function init() {

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function applyBrushSettings() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = hexToRgba(currentColorHex, 0.35);
            ctx.shadowBlur = currentSize * 0.8;
            ctx.shadowColor = hexToRgba(currentColorHex, 0.9);
        }

        sizeSlider.addEventListener('input', (e) => {
            currentSize = parseInt(e.target.value);
            applyBrushSettings();
        });

        colorPicker.addEventListener('input', (e) => {
            currentColorHex = e.target.value;
            applyBrushSettings();
        });

        stickerSizeSlider.addEventListener('input', (e) => {
            currentStickerSize = parseInt(e.target.value);
            stickerSizeValue.textContent = currentStickerSize + 'px';
        });

        emojiSizeSlider.addEventListener('input', (e) => {
            currentEmojiSize = parseInt(e.target.value);
            emojiSizeValue.textContent = currentEmojiSize + 'px';
        });

        function generateStickerMenu() {
            stickerGrid.innerHTML = '';
            stickers.forEach((sticker) => {
                const div = document.createElement('div');
                div.className = 'sticker-item';
                
                const img = document.createElement('img');
                img.src = sticker.url;
                img.alt = sticker.name;
                img.crossOrigin = "Anonymous";
                
                img.onerror = function() {
                    div.style.background = 'rgba(255,0,0,0.2)';
                    div.innerHTML = '<span style="color: white; font-size: 10px;">❌</span>';
                };
                
                div.appendChild(img);
                div.addEventListener('click', () => selectSticker(img));
                stickerGrid.appendChild(div);
            });
            renderGalleryStickers();
        }

        function renderGalleryStickers() {
            const oldGallerySection = document.getElementById('gallerySection');
            if (oldGallerySection) oldGallerySection.remove();

            if (galleryImages.length === 0) return;

            const section = document.createElement('div');
            section.id = 'gallerySection';
            section.style.gridColumn = '1 / -1';
            section.style.marginTop = '10px';
            section.style.borderTop = '1px solid rgba(255,255,255,0.1)';
            section.style.paddingTop = '10px';

            const title = document.createElement('p');
            title.style.color = 'rgba(255,255,255,0.5)';
            title.style.fontSize = '11px';
            title.style.margin = '0 0 10px 0';
            title.textContent = '📁 Depuis la galerie / selfie :';
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.style.display = 'grid';
            grid.style.gridTemplateColumns = 'repeat(4, 1fr)';
            grid.style.gap = '10px';

            galleryImages.forEach((dataUrl, index) => {
                const div = document.createElement('div');
                div.className = 'sticker-item';
                div.style.position = 'relative';

                const img = document.createElement('img');
                img.src = dataUrl;
                img.alt = 'gallery-' + index;

                div.appendChild(img);

                const removeBtn = document.createElement('button');
                removeBtn.textContent = '✖';
                removeBtn.style.position = 'absolute';
                removeBtn.style.top = '2px';
                removeBtn.style.right = '2px';
                removeBtn.style.background = 'rgba(255,0,0,0.7)';
                removeBtn.style.border = 'none';
                removeBtn.style.color = 'white';
                removeBtn.style.borderRadius = '50%';
                removeBtn.style.width = '18px';
                removeBtn.style.height = '18px';
                removeBtn.style.fontSize = '10px';
                removeBtn.style.cursor = 'pointer';
                removeBtn.style.lineHeight = '1';
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    galleryImages.splice(index, 1);
                    renderGalleryStickers();
                });

                div.appendChild(removeBtn);
                div.addEventListener('click', () => selectSticker(img));
                grid.appendChild(div);
            });

            section.appendChild(grid);
            stickerGrid.appendChild(section);
        }

        function selectSticker(imgElement) {
            activeStickerImg = imgElement;
            activeStickerImg._type = 'image';
            stickerMode = true;
            stickerPanel.classList.remove('open');
            showNotification('📍 Touche l\'écran pour placer !');
        }

        function generateEmojiMenu() {
            emojiGrid.innerHTML = '';
            Object.keys(emojiCategories).forEach(category => {
                const catTitle = document.createElement('div');
                catTitle.style.gridColumn = '1 / -1';
                catTitle.style.color = 'rgba(255,255,255,0.4)';
                catTitle.style.fontSize = '11px';
                catTitle.style.padding = '5px 0 2px 5px';
                catTitle.textContent = category;
                emojiGrid.appendChild(catTitle);

                emojiCategories[category].forEach(emoji => {
                    const div = document.createElement('div');
                    div.className = 'emoji-item';
                    div.textContent = emoji;
                    div.addEventListener('click', () => selectEmoji(emoji));
                    emojiGrid.appendChild(div);
                });
            });
        }

        function selectEmoji(emoji) {
            const tempCanvas = document.createElement('canvas');
            const size = currentEmojiSize * 2;
            tempCanvas.width = size;
            tempCanvas.height = size;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.font = `${size * 0.85}px serif`;
            tempCtx.textAlign = 'center';
            tempCtx.textBaseline = 'middle';
            tempCtx.fillText(emoji, size / 2, size / 2);

            const img = new Image();
            img.src = tempCanvas.toDataURL();
            img._type = 'emoji';
            img._emojiSize = currentEmojiSize;

            img.onload = () => {
                activeStickerImg = img;
                stickerMode = true;
                emojiPanel.classList.remove('open');
                showNotification('📍 Touche l\'écran pour placer l\'emoji !');
            };
        }

        galleryBtn.addEventListener('click', () => galleryInput.click());

        galleryInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            let loaded = 0;
            const total = files.length;

            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    galleryImages.push(event.target.result);
                    loaded++;
                    if (loaded >= total) {
                        renderGalleryStickers();
                        showNotification(`✅ ${loaded} image(s) ajoutée(s) !`);
                        stickerPanel.classList.add('open');
                    }
                };
                reader.readAsDataURL(file);
            });
            galleryInput.value = '';
        });

        emojiBtn.addEventListener('click', () => {
            emojiPanel.classList.add('open');
            stickerPanel.classList.remove('open');
        });

        closeEmojiBtn.addEventListener('click', () => {
            emojiPanel.classList.remove('open');
            stickerMode = false;
        });

        function placeSticker(x, y) {
            if (!activeStickerImg || !stickerMode) return;

            let size;
            if (activeStickerImg._type === 'emoji') {
                size = activeStickerImg._emojiSize || currentEmojiSize;
            } else {
                size = currentStickerSize;
            }

            const ctxBackup = ctx.globalCompositeOperation;
            const shadowBackup = ctx.shadowBlur;
            const strokeBackup = ctx.strokeStyle;
            const shadowColorBackup = ctx.shadowColor;

            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'transparent';

            ctx.drawImage(activeStickerImg, x - size/2, y - size/2, size, size);

            ctx.globalCompositeOperation = ctxBackup;
            ctx.shadowBlur = shadowBackup;
            ctx.strokeStyle = strokeBackup;
            ctx.shadowColor = shadowColorBackup;

            stickerMode = false;
            activeStickerImg = null;
            showNotification('✅ Ajouté !');
        }

        stickerBtn.addEventListener('click', () => {
            stickerPanel.classList.add('open');
            emojiPanel.classList.remove('open');
        });

        closeStickerBtn.addEventListener('click', () => {
            stickerPanel.classList.remove('open');
            stickerMode = false;
        });

        function getPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function startDraw(e) {
            if (e.target !== canvas && !e.target.classList.contains('sticker-item')) return;
            const pos = getPos(e);
            if (stickerMode) {
                placeSticker(pos.x, pos.y);
                return;
            }
            isDrawing = true;
            [lastX, lastY] = [pos.x, pos.y];
            drawDot(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing || stickerMode) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            [lastX, lastY] = [pos.x, pos.y];
        }

        function drawDot(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2);
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fill();
        }

        function endDraw() {
            isDrawing = false;
        }

        function showNotification(message) {
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 3000);

                let height = canvas.height;
                if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; }
                tempCanvas.width = width;
                tempCanvas.height = height;
                tempCtx.fillStyle = '#0a0a12';
                tempCtx.fillRect(0, 0, width, height);
                tempCtx.drawImage(canvas, 0, 0, width, height);
                
                const compressedDataUrl = tempCanvas.toDataURL('image/jpeg', 0.7);
                const base64Image = compressedDataUrl.split(',')[1];

        /**
         * Démarre le flux vidéo de la caméra
         * @param {string} facingMode - 'user' (selfie) ou 'environment' (arrière)
         */
        async function startCamera(facingMode = 'user') {
            // Arrêter tout flux existant
            stopCamera();

            // Cacher l'erreur si affichée
            cameraError.classList.remove('show');
            cameraVideo.style.display = 'block';

            try {
                // Demande d'accès à la caméra
                const constraints = {
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                cameraVideo.srcObject = stream;

                // ✅ IMPORTANT : miroir pour mode selfie (plus naturel)
                cameraVideo.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

                // Mise à jour du titre
                cameraTitle.textContent = facingMode === 'user' ? '📷 Selfie' : '📷 Caméra arrière';

            } catch (err) {
                console.error('Erreur caméra:', err);
                cameraVideo.style.display = 'none';
                
                // Message d'erreur personnalisé selon le type d'erreur
                let errorMsg = 'Impossible d\'accéder à la caméra.';
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    errorMsg = 'Permission refusée. Autorise l\'accès à la caméra dans les paramètres de ton navigateur.';
                } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                    errorMsg = 'Aucune caméra détectée sur cet appareil.';
                } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                    errorMsg = 'La caméra est déjà utilisée par une autre application.';
                } else if (err.name === 'OverconstrainedError') {
                    // Fallback : essayer sans contrainte facingMode
                    try {
                        const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                        currentStream = fallbackStream;
                        cameraVideo.srcObject = fallbackStream;
                        cameraVideo.style.transform = 'scaleX(1)';
                        cameraTitle.textContent = '📷 Caméra';
                        return;
                    } catch (e2) {
                        errorMsg = 'Impossible d\'accéder à la caméra.';
                    }
                }
                
                cameraErrorMsg.textContent = errorMsg;
                cameraError.classList.add('show');
            }
        }

        /**
         * Arrête le flux vidéo et libère la caméra
         */
        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            cameraVideo.srcObject = null;
        }

        /**
         * Ouvre l'overlay caméra
         */
        function openCamera() {
            cameraOverlay.classList.add('show');
            cameraPreview.style.display = 'none';
            cameraBottomBar.style.display = 'flex';
            cameraConfirmBar.classList.remove('show');
            capturedPhotoDataUrl = null;
            
            // Démarrer en mode selfie
            currentFacingMode = 'user';
            startCamera(currentFacingMode);
        }

        /**
         * Ferme l'overlay caméra
         */
        function closeCamera() {
            cameraOverlay.classList.remove('show');
            stopCamera();
            cameraPreview.style.display = 'none';
            cameraBottomBar.style.display = 'flex';
            cameraConfirmBar.classList.remove('show');
            capturedPhotoDataUrl = null;
        }

        /**
         * Bascule entre caméra avant et arrière
         */
        function switchCamera() {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            startCamera(currentFacingMode);
        }

        /**
         * Capture une photo depuis le flux vidéo
         * Gère le miroir selfie pour que la photo corresponde à ce qu'on voit
         */
        function capturePhoto() {
            if (!currentStream) return;

            // Effet flash
            cameraFlash.classList.add('flash');
            setTimeout(() => cameraFlash.classList.remove('flash'), 200);

            // Canvas temporaire pour capturer
            const captureCanvas = document.createElement('canvas');
            const captureCtx = captureCanvas.getContext('2d');
            
            // Utiliser les dimensions réelles de la vidéo
            captureCanvas.width = cameraVideo.videoWidth;
            captureCanvas.height = cameraVideo.videoHeight;

            // ✅ Si mode selfie, on miroir l'image pour correspondre à la preview
            if (currentFacingMode === 'user') {
                captureCtx.translate(captureCanvas.width, 0);
                captureCtx.scale(-1, 1);
            }

            captureCtx.drawImage(cameraVideo, 0, 0, captureCanvas.width, captureCanvas.height);

            // Convertir en dataURL (JPEG pour taille réduite)
            capturedPhotoDataUrl = captureCanvas.toDataURL('image/jpeg', 0.85);

            // Afficher la preview
            cameraPreview.src = capturedPhotoDataUrl;
            cameraPreview.style.display = 'block';
            cameraBottomBar.style.display = 'none';
            cameraConfirmBar.classList.add('show');

            // Arrêter la caméra pour économiser la batterie
            stopCamera();
        }

        /**
         * Refaire la photo (retour au live)
         */
        function retakePhoto() {
            capturedPhotoDataUrl = null;
            cameraPreview.style.display = 'none';
            cameraBottomBar.style.display = 'flex';
            cameraConfirmBar.classList.remove('show');
            startCamera(currentFacingMode);
        }

        /**
         * Valider la photo et l'ajouter comme sticker
         */
        function usePhoto() {
            if (!capturedPhotoDataUrl) return;

            // Sauvegarder dans la galerie
            galleryImages.push(capturedPhotoDataUrl);
            renderGalleryStickers();

            // Créer un élément image pour le placement
            const img = new Image();
            img.src = capturedPhotoDataUrl;
            img._type = 'image';
            img._emojiSize = null;

            img.onload = () => {
                activeStickerImg = img;
                stickerMode = true;
                closeCamera();
                showNotification('📍 Touche l\'écran pour placer ta photo !');
            };
        }

        // ============================================================
        // ✅ NOUVEAU : EVENT LISTENERS CAMÉRA
        // ============================================================
        selfieBtn.addEventListener('click', () => {
            // Vérifier que l'API est disponible
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showNotification('❌ Caméra non supportée sur ce navigateur');
                return;
            }
            openCamera();
        });

        cameraCloseBtn.addEventListener('click', closeCamera);
        cameraSwitchBtn.addEventListener('click', switchCamera);
        captureBtn.addEventListener('click', capturePhoto);
        retakeBtn.addEventListener('click', retakePhoto);
        usePhotoBtn.addEventListener('click', usePhoto);
        cameraErrorClose.addEventListener('click', closeCamera);

        // Empêcher les interactions de dessin sur l'overlay caméra
        cameraOverlay.addEventListener('touchstart', (e) => e.stopPropagation());
        cameraOverlay.addEventListener('touchmove', (e) => e.stopPropagation());

        init();
    </script>
</body>
</html>
