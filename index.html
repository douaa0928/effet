<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dessiner avec du Brouillard</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a12;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        .toolbar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(30, 30, 45, 0.7);
            padding: 6px 10px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            flex-wrap: nowrap;
            justify-content: center;
            max-width: 95%;
        }
        .toolbar .tool-label { display: inline; }
        .tool-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tool-label {
            color: rgba(255,255,255,0.7);
            font-size: 11px;
        }
        #sizeSlider {
            width: 60px;
            accent-color: #00d2ff;
            cursor: pointer;
        }
        #colorPicker {
            width: 25px;
            height: 25px;
            border: none;
            border-radius: 50%;
            background: none;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }
        #colorPicker::-webkit-color-swatch-wrapper { padding: 0; }
        #colorPicker::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; }
        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        #clearBtn { background: rgba(255, 80, 80, 0.2); color: white; border: 1px solid rgba(255, 80, 80, 0.4); }
        #clearBtn:active { background: rgba(255, 80, 80, 0.5); }
        #saveBtn { background: rgba(80, 255, 120, 0.2); color: white; border: 1px solid rgba(80, 255, 120, 0.4); }
        #saveBtn:active { background: rgba(80, 255, 120, 0.5); }
        #sendEmailBtn { background: rgba(100, 150, 255, 0.3); color: white; border: 1px solid rgba(100, 150, 255, 0.6); }
        #sendEmailBtn:active { background: rgba(100, 150, 255, 0.6); }
        #stickerBtn { background: rgba(255, 200, 50, 0.2); color: white; border: 1px solid rgba(255, 200, 50, 0.4); }
        #stickerBtn:active { background: rgba(255, 200, 50, 0.5); }
        #info {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            pointer-events: none;
            z-index: 5;
        }
        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            text-align: center;
            max-width: 80%;
        }
        .notification.show { opacity: 1; }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 40px;
            border-radius: 10px;
            font-size: 16px;
            z-index: 100;
            display: none;
        }
        .loading.show { display: block; }
        #stickerPanel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 30, 0.95);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 15px;
            z-index: 50;
            transform: translateY(110%);
            transition: transform 0.3s ease-out;
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        #stickerPanel.open {
            transform: translateY(0);
        }
        .sticker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: white;
        }
        .sticker-header h3 { margin: 0; font-size: 16px; }
        .close-stickers {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
        }
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-height: 40vh;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .sticker-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            overflow: hidden;
        }
        .sticker-item:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.2);
        }
        .sticker-item img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            pointer-events: none;
        }
        .sticker-item.emoji-sticker {
            font-size: 40px;
            background: rgba(255,255,255,0.05);
        }

        /* ============================================================
         * ✅✅✅ Styles pour les onglets du panneau stickers
         * ============================================================ */
        .sticker-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .sticker-tab {
            padding: 8px 12px;
            border: none;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .sticker-tab.active {
            background: rgba(100, 150, 255, 0.3);
            color: white;
            border: 1px solid rgba(100, 150, 255, 0.5);
        }
        .sticker-tab:active {
            transform: scale(0.95);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* ============================================================
         * ✅✅✅ Styles pour le bouton d'upload de galerie
         * ============================================================ */
        .upload-gallery-btn {
            width: 100%;
            padding: 15px;
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .upload-gallery-btn:active {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.5);
        }
        .upload-gallery-btn span {
            font-size: 24px;
        }

        /* ============================================================
         * ✅✅✅ Styles pour la taille des emojis
         * ============================================================ */
        .emoji-size-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .emoji-size-control label {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            white-space: nowrap;
        }
        .emoji-size-control input[type="range"] {
            flex: 1;
            accent-color: #ff9900;
        }

        /* ============================================================
         * ✅✅✅ Styles pour les images de galerie dans la grille
         * ============================================================ */
        .sticker-item.gallery-item {
            position: relative;
        }
        .gallery-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0, 150, 255, 0.8);
            color: white;
            font-size: 8px;
            padding: 2px 4px;
            border-radius: 5px;
        }

        /* ============================================================
         * ✅✅✅ NOUVEAU : Styles pour l'option Photo / Caméra
         * Panneau de prise de photo plein écran avec aperçu live
         * Boutons : selfie 🤳, caméra arrière 📸, valider ✅, annuler ❌
         * ============================================================ */
        #cameraPanel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #cameraPanel.open {
            display: flex;
        }
        #cameraVideo {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 15px;
            background: #111;
        }
        #cameraCanvas {
            display: none; /* canvas caché pour capturer la photo */
        }
        .camera-controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            align-items: center;
        }
        .camera-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .camera-btn:active {
            transform: scale(0.9);
        }
        .camera-btn.capture {
            width: 75px;
            height: 75px;
            background: rgba(255, 50, 50, 0.8);
            border-color: rgba(255, 100, 100, 0.9);
            font-size: 32px;
        }
        .camera-btn.capture:active {
            background: rgba(255, 50, 50, 1);
        }
        .camera-label {
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            text-align: center;
            margin-top: 5px;
        }
        .camera-btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Preview après prise de photo */
        #photoPreview {
            display: none;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3/4;
            object-fit: contain;
            border-radius: 15px;
            border: 3px solid rgba(255,255,255,0.3);
        }
        #photoPreview.visible {
            display: block;
        }
        #cameraVideo.hidden {
            display: none;
        }
        /* Bouton caméra dans la toolbar */
        #cameraBtn {
            background: rgba(255, 100, 200, 0.2);
            color: white;
            border: 1px solid rgba(255, 100, 200, 0.4);
        }
        #cameraBtn:active {
            background: rgba(255, 100, 200, 0.5);
        }

        /* ============================================================
         * ✅✅✅ NOUVEAU : Bouton caméra direct dans l'onglet Galerie
         * ============================================================ */
        .camera-gallery-btn {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 100, 200, 0.5);
            border-radius: 10px;
            background: rgba(255, 100, 200, 0.15);
            color: rgba(255,255,255,0.9);
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 10px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .camera-gallery-btn:active {
            background: rgba(255, 100, 200, 0.4);
            border-color: rgba(255, 100, 200, 0.8);
        }
        .camera-gallery-btn span {
            font-size: 24px;
        }

        /* ============================================================
         * ✅✅✅ SUPPRIMER photo de la galerie
         * Petit bouton X rouge en haut à droite de chaque sticker galerie
         * ============================================================ */
        .delete-sticker-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(255, 50, 50, 0.85);
            color: white;
            border: none;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            line-height: 1;
            padding: 0;
            transition: transform 0.15s, background 0.15s;
        }
        .delete-sticker-btn:active {
            transform: scale(1.2);
            background: rgba(255, 50, 50, 1);
        }

        /* ============================================================
         * ✅✅✅ MODE MOBILE : toolbar tout en une seule ligne horizontale
         * On cache les labels texte, on réduit les éléments
         * pour libérer un max d'espace de dessin
         * ============================================================ */
        @media (max-width: 600px) {
            .toolbar {
                flex-wrap: nowrap !important;
                gap: 3px !important;
                padding: 4px 6px !important;
                top: 6px !important;
                max-width: 99% !important;
                border-radius: 18px !important;
            }
            /* Cache les labels texte + texte des boutons */
            .toolbar .tool-label {
                display: none !important;
            }
            .btn-text {
                display: none !important;
            }
            .tool-group {
                gap: 3px !important;
            }
            /* Boutons très compacts */
            .toolbar .btn {
                padding: 4px 6px !important;
                font-size: 10px !important;
                border-radius: 12px !important;
            }
            /* Slider tout petit */
            #sizeSlider {
                width: 35px !important;
            }
            /* Color picker mini */
            #colorPicker {
                width: 20px !important;
                height: 20px !important;
            }
            /* Cache le texte dans les boutons de la toolbar */
            .toolbar .btn {
                white-space: nowrap !important;
            }
            /* Info en bas plus discret */
            #info {
                font-size: 11px !important;
                bottom: 10px !important;
            }
            /* Panneau stickers moins haut sur mobile */
            .sticker-grid {
                max-height: 35vh !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="fogCanvas"></canvas>
    <div class="toolbar">
        <div class="tool-group">
            <span class="tool-label">Taille</span>
            <input type="range" id="sizeSlider" min="5" max="120" value="25">
        </div>

        <div class="tool-group">
            <span class="tool-label">Couleur</span>
            <input type="color" id="colorPicker" value="#d2e6ff">
        </div>

        <!-- ============================================================
         * ✅✅✅ NOUVEAU : Bouton caméra directe dans la toolbar
         * Accès rapide pour se prendre en photo sans ouvrir le panneau
         * ============================================================ -->
        <button id="cameraBtn" class="btn"><span class="btn-icon">📸</span><span class="btn-text">Photo</span></button>

        <button id="stickerBtn" class="btn"><span class="btn-icon">🏷️</span><span class="btn-text">Stickers</span></button>
        <button id="sendEmailBtn" class="btn"><span class="btn-icon">📧</span><span class="btn-text">Envoyer</span></button>
        <button id="saveBtn" class="btn"><span class="btn-icon">💾</span><span class="btn-text">Sauver</span></button>
        <button id="clearBtn" class="btn"><span class="btn-icon">🗑️</span><span class="btn-text">Effacer</span></button>
    </div>
    <div id="info">Dessine ou écris avec ton doigt ✨</div>
    <div id="notification" class="notification"></div>
    <div id="loading" class="loading"> Envoi en cours...</div>

    <!-- ============================================================
     * ✅✅✅ NOUVEAU : PANNEAU CAMÉRA / PHOTO
     * Interface plein écran pour prendre des photos
     * Avec bouton selfie 🤳 (caméra avant) et caméra arrière 📸
     * Aperçu après la prise de photo pour valider ou recommencer
     * ============================================================ -->
    <div id="cameraPanel">
        <video id="cameraVideo" autoplay playsinline></video>
        <canvas id="cameraCanvas"></canvas>
        <img id="photoPreview" alt="Aperçu de la photo">

        <div class="camera-controls" id="cameraControls">
            <!-- ============================================================
             * ✅✅✅ NOUVEAU : Bouton Selfie (caméra avant)
             * facingMode: "user" = caméra frontale pour les selfies
             * ============================================================ -->
            <div class="camera-btn-wrapper">
                <button class="camera-btn" id="selfieBtn">🤳</button>
                <div class="camera-label">Selfie</div>
            </div>

            <!-- ============================================================
             * ✅✅✅ NOUVEAU : Bouton Prendre la photo
             * Capture l'image du flux vidéo et affiche l'aperçu
             * ============================================================ -->
            <div class="camera-btn-wrapper">
                <button class="camera-btn capture" id="captureBtn">📷</button>
                <div class="camera-label">Photo</div>
            </div>

            <!-- ============================================================
             * ✅✅✅ NOUVEAU : Bouton Caméra arrière
             * facingMode: "environment" = caméra du dos du téléphone
             * ============================================================ -->
            <div class="camera-btn-wrapper">
                <button class="camera-btn" id="backCamBtn">🔄</button>
                <div class="camera-label">Arrière</div>
            </div>
        </div>

        <div class="camera-controls" id="previewControls" style="display: none;">
            <!-- ============================================================
             * ✅✅✅ NOUVEAU : Bouton Annuler (reprendre une photo)
             * Efface l'aperçu et relance le flux caméra
             * ============================================================ -->
            <div class="camera-btn-wrapper">
                <button class="camera-btn" id="retakeBtn">❌</button>
                <div class="camera-label">Refaire</div>
            </div>

            <!-- ============================================================
             * ✅✅✅ NOUVEAU : Bouton Valider la photo
             * Ajoute la photo comme sticker dans la galerie
             * ============================================================ -->
            <div class="camera-btn-wrapper">
                <button class="camera-btn capture" id="confirmBtn">✅</button>
                <div class="camera-label">Utiliser</div>
            </div>
        </div>
    </div>

    <!-- ============================================================
     * ✅✅✅ MENU AUTOCOLLANTS AMÉLIORÉ
     * 4 onglets : Prédéfinis, Ma Galerie, 📸 Photo, Emojis
     * ============================================================ -->
    <div id="stickerPanel">
        <div class="sticker-header">
            <h3>✨ Choisis un autocollant</h3>
            <button class="close-stickers" id="closeStickerBtn">Fermer ✖</button>
        </div>

        <!-- ============================================================
         * ✅✅✅ Système d'onglets - 4 onglets au lieu de 3
         * Ajout de l'onglet "📸 Photo" pour accéder à la caméra
         * ============================================================ -->
        <div class="sticker-tabs">
            <button class="sticker-tab active" data-tab="default">🎨 Prédéfinis</button>
            <button class="sticker-tab" data-tab="gallery">📁 Galerie</button>
            <button class="sticker-tab" data-tab="camera">📸 Photo</button>
            <button class="sticker-tab" data-tab="emoji">😀 Emojis</button>
        </div>

        <!-- Onglet 1: Stickers prédéfinis (existants) -->
        <div class="tab-content active" id="tab-default">
            <div class="sticker-grid" id="stickerGrid"></div>
        </div>

        <!-- ============================================================
         * ✅✅✅ Onglet 2 - Galerie personnalisée
         * Ajout du bouton "📸 Prendre une photo" en plus de "Ajouter depuis ma galerie"
         * ============================================================ -->
        <div class="tab-content" id="tab-gallery">
            <input type="file" id="galleryUpload" accept="image/*" style="display: none;" multiple>
            <!-- ✅✅✅ NOUVEAU : Bouton caméra dans l'onglet galerie -->
            <button class="camera-gallery-btn" id="galleryCameraBtn">
                <span>📸</span>
                Prendre une photo maintenant
            </button>
            <button class="upload-gallery-btn" id="uploadBtn">
                <span>🖼️</span>
                Ajouter depuis ma galerie
            </button>
            <div class="sticker-grid" id="galleryGrid"></div>
        </div>

        <!-- ============================================================
         * ✅✅✅ NOUVEAU : Onglet 3 - Accès rapide à la caméra
         * Un bouton central pour ouvrir directement le panneau photo
         * ============================================================ -->
        <div class="tab-content" id="tab-camera">
            <button class="camera-gallery-btn" id="cameraTabBtn" style="margin-top: 30px;">
                <span>📸</span>
                Ouvrir la caméra
            </button>
            <p style="color: rgba(255,255,255,0.5); text-align: center; font-size: 12px; margin-top: 15px;">
                Prends une photo et ajoute-la directement comme autocollant !
            </p>
        </div>

        <!-- Onglet 4: Emojis -->
        <div class="tab-content" id="tab-emoji">
            <div class="emoji-size-control">
                <label>Taille:</label>
                <input type="range" id="emojiSizeSlider" min="30" max="200" value="80">
                <span id="emojiSizeValue" style="color: white; font-size: 12px;">80px</span>
            </div>
            <div class="sticker-grid" id="emojiGrid"></div>
        </div>
    </div>

    <script type="text/javascript">
        // --- CONFIGURATION EMAILJS ---
        emailjs.init("2HSpDxAF3uZuAKH-l");
        const SERVICE_ID = "service_ctymr5f";
        const TEMPLATE_ID = "template_wc1x8ag";
        const TO_EMAIL = "insim5628@gmail.com";
        // --- VARIABLES GLOBALES ---
        const canvas = document.getElementById('fogCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        const sendEmailBtn = document.getElementById('sendEmailBtn');
        const stickerBtn = document.getElementById('stickerBtn');
        const stickerPanel = document.getElementById('stickerPanel');
        const closeStickerBtn = document.getElementById('closeStickerBtn');
        const stickerGrid = document.getElementById('stickerGrid');
        const sizeSlider = document.getElementById('sizeSlider');
        const colorPicker = document.getElementById('colorPicker');
        const notification = document.getElementById('notification');
        const loading = document.getElementById('loading');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let currentSize = 25;
        let currentColorHex = '#d2e6ff';
        // --- AUTOCOLLANTS ---
        let activeStickerImg = null;
        let stickerMode = false;

        // ============================================================
        // ✅✅✅ Variables pour les fonctionnalités galerie/emoji/caméra
        // galleryStickers: stocke les images uploadées par l'utilisateur
        // currentEmoji: stocke l'emoji sélectionné pour placement
        // currentEmojiSize: taille de l'emoji en pixels
        // cameraStream: flux vidéo de la caméra
        // currentFacingMode: "user" (selfie) ou "environment" (arrière)
        // capturedPhotoData: données de la photo capturée (data URL)
        // ============================================================
        let galleryStickers = [];
        let currentEmoji = null;
        let currentEmojiSize = 80;
        let cameraStream = null;
        let currentFacingMode = 'user'; // Par défaut : caméra frontale (selfie)
        let capturedPhotoData = null;

        // ✅ LISTE DES AUTOCOLLANTS - CHEMINS RELATIFS
        const stickers = [
            { name: "d1", url: "douaa1.png" },
            { name: "dou7", url: "dou7.png" },
            { name: "dou2", url: "dou2.png" },
            { name: "dou8", url: "dou8.png" },
            { name: "dou6", url: "dou6.png" },
            { name: "dou4", url: "dou4.png" },
            { name: "dou5", url: "dou5.png" },
            { name: "dou3", url: "dou3.png" },
            { name: "lion1", url: "liondou.png" },
            { name: "lion", url: "liondo.png" },
        ];

        // ============================================================
        // ✅✅✅ Liste d'emojis populaires pour le dessin
        // ============================================================
        const emojis = [
            "😀", "😂", "😍", "🥰", "😎", "🤩", "🥳", "😜",
            "👍", "👏", "🤝", "💪", "🙏", "✌️", "🤟", "👋",
            "❤️", "💖", "💝", "💕", "💗", "🧡", "💛", "💚",
            "🔥", "⭐", "🌟", "✨", "💫", "🌈", "🎈", "🎉",
            "🐱", "🐶", "🐻", "🦁", "🐼", "🐨", "🐯", "🦊",
            "🌸", "🌺", "🌻", "🌷", "🌹", "💐", "🍀", "🌿",
            "🎵", "🎶", "🎸", "🎹", "🎺", "🥁", "🎻", "🎤",
            "🍎", "🍕", "🍔", "🍟", "🍦", "🍩", "🍪", "🎂"
        ];

        // Initialisation
        function init() {
            resizeCanvas();
            applyBrushSettings();
            generateStickerMenu();
            generateEmojiGrid();
            setupGalleryUpload();
            setupTabSystem();
            setupEmojiSizeSlider();
            setupCameraSystem();
        }
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
        function applyBrushSettings() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = hexToRgba(currentColorHex, 0.35);
            ctx.shadowBlur = currentSize * 0.8;
            ctx.shadowColor = hexToRgba(currentColorHex, 0.9);
        }
        sizeSlider.addEventListener('input', (e) => {
            currentSize = parseInt(e.target.value);
            applyBrushSettings();
        });
        colorPicker.addEventListener('input', (e) => {
            currentColorHex = e.target.value;
            applyBrushSettings();
        });
        // --- GESTION DES AUTOCOLLANTS ---
        function generateStickerMenu() {
            stickerGrid.innerHTML = '';
            stickers.forEach((sticker) => {
                const div = document.createElement('div');
                div.className = 'sticker-item';
                const img = document.createElement('img');
                img.src = sticker.url;
                img.alt = sticker.name;
                img.crossOrigin = "Anonymous";
                img.onerror = function() {
                    console.error('Image non trouvée:', sticker.url);
                    div.style.background = 'rgba(255,0,0,0.2)';
                    div.innerHTML = '<span style="color: white; font-size: 10px;">❌</span>';
                };
                div.appendChild(img);
                div.addEventListener('click', () => {
                    selectSticker(img);
                });
                stickerGrid.appendChild(div);
            });
        }
        function selectSticker(imgElement) {
            activeStickerImg = imgElement;
            stickerMode = true;
            stickerPanel.classList.remove('open');
            showNotification('📍 Touche l\'écran pour placer !');
        }
        function placeSticker(x, y) {
            if (!activeStickerImg || !stickerMode) return;
            const size = 150;
            const ctxBackup = ctx.globalCompositeOperation;
            const shadowBackup = ctx.shadowBlur;
            const strokeBackup = ctx.strokeStyle;
            const shadowColorBackup = ctx.shadowColor;
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'transparent';
            ctx.drawImage(activeStickerImg, x - size/2, y - size/2, size, size);
            ctx.globalCompositeOperation = ctxBackup;
            ctx.shadowBlur = shadowBackup;
            ctx.strokeStyle = strokeBackup;
            ctx.shadowColor = shadowColorBackup;
            stickerMode = false;
            activeStickerImg = null;
            showNotification('✅ Autocollant ajouté !');
        }
        // --- EVENTS AUTOCOLLANTS ---
        stickerBtn.addEventListener('click', () => {
            stickerPanel.classList.add('open');
        });
        closeStickerBtn.addEventListener('click', () => {
            stickerPanel.classList.remove('open');
            stickerMode = false;
        });
        // --- DESSIN ET PLACEMENT ---
        function getPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }
        function startDraw(e) {
            if (e.target !== canvas && !e.target.classList.contains('sticker-item')) return;
            const pos = getPos(e);
            if (stickerMode) {
                placeSticker(pos.x, pos.y);
                return;
            }
            if (currentEmoji) {
                placeEmoji(pos.x, pos.y, currentEmoji, currentEmojiSize);
                currentEmoji = null;
                return;
            }
            isDrawing = true;
            [lastX, lastY] = [pos.x, pos.y];
            drawDot(pos.x, pos.y);
        }
        function draw(e) {
            if (!isDrawing || stickerMode || currentEmoji) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            [lastX, lastY] = [pos.x, pos.y];
        }
        function drawDot(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2);
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fill();
        }
        function endDraw() {
            isDrawing = false;
        }
        function showNotification(message) {
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        // --- EMAIL & SAVE ---
        sendEmailBtn.addEventListener('click', async () => {
            loading.classList.add('show');
            try {
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                const maxWidth = 800;
                const maxHeight = 600;
                let width = canvas.width;
                let height = canvas.height;
                if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; }
                tempCanvas.width = width;
                tempCanvas.height = height;
                tempCtx.fillStyle = '#0a0a12';
                tempCtx.fillRect(0, 0, width, height);
                tempCtx.drawImage(canvas, 0, 0, width, height);
                const compressedDataUrl = tempCanvas.toDataURL('image/jpeg', 0.7);
                const base64Image = compressedDataUrl.split(',')[1];
                const templateParams = {
                    to_email: TO_EMAIL,
                    message: 'Nouveau dessin brouillard !',
                    image: base64Image,
                    image_name: `dessin-${Date.now()}.jpg`
                };
                await emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams);
                loading.classList.remove('show');
                showNotification('✅ Email envoyé !');
            } catch (error) {
                loading.classList.remove('show');
                showNotification('❌ Erreur: ' + (error.text || error.message));
            }
        });
        saveBtn.addEventListener('click', async () => {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.fillStyle = '#0a0a12';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0);
            const dataURL = tempCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `dessin-brouillard-${Date.now()}.png`;
            link.href = dataURL;
            link.click();
            showNotification('✅ Sauvegardé !');
        });
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            applyBrushSettings();
            showNotification('🗑️ Effacé');
        });
        // Touch listeners
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseout', endDraw);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', endDraw);
        document.querySelectorAll('.btn, .sticker-item, .close-stickers, input').forEach(el => {
            el.addEventListener('touchstart', (e) => e.stopPropagation());
        });

        // ============================================================
        // ✅✅✅ Système d'onglets pour le panneau stickers
        // ============================================================
        function setupTabSystem() {
            const tabs = document.querySelectorAll('.sticker-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.sticker-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    const tabId = `tab-${tab.dataset.tab}`;
                    document.getElementById(tabId).classList.add('active');
                });
            });
        }

        // ============================================================
        // ✅✅✅ Génération de la grille d'emojis
        // ============================================================
        function generateEmojiGrid() {
            const emojiGrid = document.getElementById('emojiGrid');
            emojiGrid.innerHTML = '';
            emojis.forEach((emoji) => {
                const div = document.createElement('div');
                div.className = 'sticker-item emoji-sticker';
                div.textContent = emoji;
                div.addEventListener('click', () => {
                    selectEmoji(emoji);
                });
                emojiGrid.appendChild(div);
            });
        }
        function selectEmoji(emoji) {
            currentEmoji = emoji;
            stickerPanel.classList.remove('open');
            showNotification('📍 Touche l\'écran pour placer l\'emoji !');
        }
        function placeEmoji(x, y, emoji, size) {
            const ctxBackup = ctx.globalCompositeOperation;
            const fontBackup = ctx.font;
            const textAlignBackup = ctx.textAlign;
            const textBaselineBackup = ctx.textBaseline;
            ctx.globalCompositeOperation = 'source-over';
            ctx.font = `${size}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, x, y);
            ctx.globalCompositeOperation = ctxBackup;
            ctx.font = fontBackup;
            ctx.textAlign = textAlignBackup;
            ctx.textBaseline = textBaselineBackup;
            showNotification('✅ Emoji ajouté !');
        }
        function setupEmojiSizeSlider() {
            const emojiSizeSlider = document.getElementById('emojiSizeSlider');
            const emojiSizeValue = document.getElementById('emojiSizeValue');
            if (emojiSizeSlider) {
                emojiSizeSlider.addEventListener('input', (e) => {
                    currentEmojiSize = parseInt(e.target.value);
                    emojiSizeValue.textContent = `${currentEmojiSize}px`;
                });
            }
        }

        // ============================================================
        // ✅✅✅ Système d'upload d'images depuis la galerie
        // ============================================================
        function setupGalleryUpload() {
            const uploadBtn = document.getElementById('uploadBtn');
            const galleryUpload = document.getElementById('galleryUpload');
            const galleryGrid = document.getElementById('galleryGrid');
            uploadBtn.addEventListener('click', () => {
                galleryUpload.click();
            });
            galleryUpload.addEventListener('change', (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                Array.from(files).forEach(file => {
                    if (!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const imgSrc = event.target.result;
                        const stickerData = {
                            name: file.name,
                            src: imgSrc
                        };
                        galleryStickers.push(stickerData);
                        addGalleryItemToGrid(stickerData, galleryGrid);
                    };
                    reader.readAsDataURL(file);
                });
                galleryUpload.value = '';
                showNotification(`✅ ${files.length} image(s) ajoutée(s) !`);
            });
        }
        function addGalleryItemToGrid(stickerData, gridElement) {
            const div = document.createElement('div');
            div.className = 'sticker-item gallery-item';
            const img = document.createElement('img');
            img.src = stickerData.src;
            img.alt = stickerData.name;
            const badge = document.createElement('div');
            badge.className = 'gallery-badge';
            badge.textContent = 'Moi';
            div.appendChild(img);
            div.appendChild(badge);

            // ============================================================
            // ✅✅✅ NOUVEAU : Bouton supprimer (X rouge) pour chaque photo
            // Supprime le sticker de la galerie et du DOM
            // ============================================================
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-sticker-btn';
            deleteBtn.textContent = '✕';
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Empêche de sélectionner le sticker
                // Supprime du DOM
                div.remove();
                // Supprime de la galerie en mémoire
                const index = galleryStickers.indexOf(stickerData);
                if (index > -1) galleryStickers.splice(index, 1);
                showNotification('🗑️ Photo supprimée !');
            });
            div.appendChild(deleteBtn);

            div.addEventListener('click', () => {
                selectGallerySticker(img);
            });
            gridElement.appendChild(div);
        }
        function selectGallerySticker(imgElement) {
            activeStickerImg = imgElement;
            stickerMode = true;
            stickerPanel.classList.remove('open');
            showNotification('📍 Touche l\'écran pour placer ton image !');
        }

        // ============================================================
        // ✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅
        // ✅✅✅ NOUVEAU : SYSTÈME CAMÉRA / PHOTO COMPLET
        // ✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅✅
        //
        // Ce bloc ajoute TOUTE la fonctionnalité caméra :
        //
        // 1. openCamera(facingMode) - Démarre le flux vidéo de la caméra
        //    facingMode = "user" → caméra frontale (selfie 🤳)
        //    facingMode = "environment" → caméra arrière 📸
        //    Phone-friendly : utilise { video: { facingMode } } avec
        //    playsinline et autoplay pour iOS Safari
        //
        // 2. capturePhoto() - Capture l'image actuelle du flux vidéo
        //    Dessine la frame du <video> sur un <canvas> caché
        //    Convertit en data URL et affiche l'aperçu
        //
        // 3. confirmPhoto() - Valide la photo capturée
        //    Ajoute la photo dans galleryStickers ET dans galleryGrid
        //    Ferme le panneau caméra automatiquement
        //
        // 4. closeCameraPanel() - Arrête le flux vidéo et ferme le panneau
        //    Libère la caméra (stop tous les tracks) pour économiser la batterie
        //
        // 5. setupCameraSystem() - Initialise TOUS les boutons caméra :
        //    - Bouton "📸 Photo" dans la toolbar (accès rapide selfie)
        //    - Bouton "📸 Prendre une photo maintenant" dans l'onglet Galerie
        //    - Bouton "📸 Ouvrir la caméra" dans l'onglet Photo
        //    - Bouton Selfie 🤳 (caméra frontale)
        //    - Bouton Caméra arrière 🔄 (switch face arrière)
        //    - Bouton Capture 📷 (prendre la photo)
        //    - Bouton Refaire ❌ (annuler et recommencer)
        //    - Bouton Valider ✅ (confirmer et ajouter comme sticker)
        //
        // ============================================================

        const cameraPanel = document.getElementById('cameraPanel');
        const cameraVideo = document.getElementById('cameraVideo');
        const cameraCanvas = document.getElementById('cameraCanvas');
        const photoPreview = document.getElementById('photoPreview');
        const cameraControls = document.getElementById('cameraControls');
        const previewControls = document.getElementById('previewControls');
        const selfieBtn = document.getElementById('selfieBtn');
        const backCamBtn = document.getElementById('backCamBtn');
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const confirmBtn = document.getElementById('confirmBtn');
        const cameraBtn = document.getElementById('cameraBtn');
        const galleryCameraBtn = document.getElementById('galleryCameraBtn');
        const cameraTabBtn = document.getElementById('cameraTabBtn');

        /**
         * ✅✅✅ NOUVEAU : Ouvre la caméra avec le mode demandé
         * @param {string} facingMode - "user" (selfie) ou "environment" (arrière)
         * Phone-friendly : constraints optimisées pour mobile
         */
        async function openCamera(facingMode) {
            // Arrêter l'ancien flux si existant
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
            currentFacingMode = facingMode;

            try {
                // ✅✅✅ NOUVEAU : Constraints phone-friendly
                // facingMode: "user" = caméra frontale pour selfies
                // facingMode: "environment" = caméra arrière du téléphone
                // width/height idéaux pour bonne qualité sans trop consommer
                const constraints = {
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                cameraVideo.srcObject = cameraStream;

                // Réinitialiser l'interface
                cameraVideo.classList.remove('hidden');
                photoPreview.classList.remove('visible');
                cameraControls.style.display = 'flex';
                previewControls.style.display = 'none';
                capturedPhotoData = null;

                // Ouvrir le panneau
                cameraPanel.classList.add('open');
                stickerPanel.classList.remove('open');
            } catch (err) {
                console.error('Erreur caméra:', err);
                showNotification('❌ Caméra non disponible');
            }
        }

        /**
         * ✅✅✅ NOUVEAU : Capture la photo depuis le flux vidéo
         * Dessine la frame actuelle du <video> sur un <canvas> caché
         * Puis convertit en data URL pour l'aperçu
         */
        function capturePhoto() {
            if (!cameraStream) return;

            // Configurer le canvas à la taille de la vidéo
            cameraCanvas.width = cameraVideo.videoWidth;
            cameraCanvas.height = cameraVideo.videoHeight;

            const camCtx = cameraCanvas.getContext('2d');

            // ✅✅✅ NOUVEAU : Si selfie (caméra frontale), miroir horizontal
            // pour que ce soit naturel comme un vrai selfie
            if (currentFacingMode === 'user') {
                camCtx.translate(cameraCanvas.width, 0);
                camCtx.scale(-1, 1);
            }

            // Capture la frame actuelle
            camCtx.drawImage(cameraVideo, 0, 0);

            // Convertir en data URL
            capturedPhotoData = cameraCanvas.toDataURL('image/jpeg', 0.85);

            // Afficher l'aperçu
            photoPreview.src = capturedPhotoData;
            photoPreview.classList.add('visible');
            cameraVideo.classList.add('hidden');

            // Changer les contrôles
            cameraControls.style.display = 'none';
            previewControls.style.display = 'flex';

            // Vibration haptique si disponible (phone-friendly)
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        /**
         * ✅✅✅ NOUVEAU : Valide la photo et l'ajoute comme sticker
         * La photo est ajoutée à galleryStickers et à la grille de galerie
         * Puis le panneau caméra se ferme
         */
        function confirmPhoto() {
            if (!capturedPhotoData) return;

            // Créer un nom de fichier unique avec timestamp
            const timestamp = Date.now();
            const fileName = `photo-${timestamp}.jpg`;

            // Créer l'objet sticker
            const stickerData = {
                name: fileName,
                src: capturedPhotoData
            };

            // Ajouter à la galerie
            galleryStickers.push(stickerData);

            // Ajouter à la grille de l'onglet Galerie
            const galleryGrid = document.getElementById('galleryGrid');
            addGalleryItemToGrid(stickerData, galleryGrid);

            // Fermer le panneau caméra
            closeCameraPanel();

            // Notification de succès
            showNotification('📸 Photo ajoutée comme autocollant !');
        }

        /**
         * ✅✅✅ NOUVEAU : Ferme le panneau caméra et libère les ressources
         * Arrête le flux vidéo pour économiser la batterie
         */
        function closeCameraPanel() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            cameraPanel.classList.remove('open');
            capturedPhotoData = null;
        }

        /**
         * ✅✅✅ NOUVEAU : Initialise tout le système caméra
         * Connecte tous les boutons aux bonnes fonctions
         */
        function setupCameraSystem() {
            // ✅✅✅ Bouton "📸 Photo" dans la toolbar → ouvre en mode selfie
            cameraBtn.addEventListener('click', () => {
                openCamera('user');
            });

            // ✅✅✅ Bouton "Prendre une photo" dans l'onglet Galerie → ouvre en mode selfie
            galleryCameraBtn.addEventListener('click', () => {
                stickerPanel.classList.remove('open');
                openCamera('user');
            });

            // ✅✅✅ Bouton "Ouvrir la caméra" dans l'onglet Photo → ouvre en mode selfie
            cameraTabBtn.addEventListener('click', () => {
                stickerPanel.classList.remove('open');
                openCamera('user');
            });

            // ✅✅✅ Bouton Selfie 🤳 → caméra frontale
            selfieBtn.addEventListener('click', () => {
                openCamera('user');
            });

            // ✅✅✅ Bouton Caméra arrière 🔄 → bascule face arrière
            backCamBtn.addEventListener('click', () => {
                openCamera('environment');
            });

            // ✅✅✅ Bouton Capture 📷 → prend la photo
            captureBtn.addEventListener('click', () => {
                capturePhoto();
            });

            // ✅✅✅ Bouton Refaire ❌ → annule et relance la caméra
            retakeBtn.addEventListener('click', () => {
                openCamera(currentFacingMode);
            });

            // ✅✅✅ Bouton Valider ✅ → confirme et ajoute comme sticker
            confirmBtn.addEventListener('click', () => {
                confirmPhoto();
            });

            // ✅✅✅ Empêcher le panneau caméra de déclencher le dessin
            cameraPanel.addEventListener('touchstart', (e) => e.stopPropagation());
            cameraPanel.addEventListener('mousedown', (e) => e.stopPropagation());
        }

        init();
    </script>
</body>
</html>
