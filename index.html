<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dessiner avec du Brouillard</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a12;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* ─── CUSTOM CURSOR ─── */
        #cursorRing {
            position: fixed;
            top: 0; left: 0;
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.7);
            pointer-events: none;
            transform: translate(-50%,-50%);
            z-index: 9999;
            transition: width .1s, height .1s, opacity .2s;
            mix-blend-mode: difference;
        }

        /* ─── TOOLBAR ─── */
        .toolbar {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20, 20, 35, 0.85);
            padding: 8px 14px;
            border-radius: 28px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.12);
            z-index: 20;
            box-shadow: 0 6px 24px rgba(0,0,0,0.4);
            flex-wrap: nowrap;
            max-width: calc(100vw - 20px);
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .toolbar::-webkit-scrollbar { display: none; }

        .tool-sep {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.15);
            flex-shrink: 0;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .tool-label {
            color: rgba(255,255,255,0.55);
            font-size: 11px;
            flex-shrink: 0;
        }

        /* Size slider */
        #sizeSlider {
            width: 65px;
            accent-color: #00d2ff;
            cursor: pointer;
        }

        /* Color picker */
        #colorPicker {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: none;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
            flex-shrink: 0;
        }
        #colorPicker::-webkit-color-swatch-wrapper { padding: 0; }
        #colorPicker::-webkit-color-swatch {
            border: 2.5px solid rgba(255,255,255,0.55);
            border-radius: 50%;
        }

        /* Color preview dot */
        #colorDot {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            flex-shrink: 0;
            pointer-events: none;
            transition: background .15s;
        }

        /* Brush preview */
        #brushPreview {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            pointer-events: none;
        }
        #brushDot {
            border-radius: 50%;
            background: currentColor;
            transition: width .1s, height .1s;
        }

        /* Buttons */
        .btn {
            padding: 0;
            border: none;
            border-radius: 50%;
            font-size: 17px;
            cursor: pointer;
            transition: transform .15s, filter .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            white-space: nowrap;
            flex-shrink: 0;
            position: relative;
        }
        .btn:active { transform: scale(0.88); }
        .btn.active-tool::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%; transform: translateX(-50%);
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #00d2ff;
        }

        #eraserBtn  { background: rgba(255,255,255,0.1);  border: 1px solid rgba(255,255,255,0.2); }
        #undoBtn    { background: rgba(180,180,255,0.15); border: 1px solid rgba(180,180,255,0.3); }
        #clearBtn   { background: rgba(255,80,80,0.18);   border: 1px solid rgba(255,80,80,0.35); }
        #saveBtn    { background: rgba(80,255,120,0.18);  border: 1px solid rgba(80,255,120,0.35); }
        #sendEmailBtn{ background: rgba(100,150,255,0.25);border: 1px solid rgba(100,150,255,0.5); }
        #stickerBtn { background: rgba(255,200,50,0.18);  border: 1px solid rgba(255,200,50,0.35); }
        #galleryBtn { background: rgba(200,100,255,0.18); border: 1px solid rgba(200,100,255,0.35); }
        #emojiBtn   { background: rgba(255,150,50,0.18);  border: 1px solid rgba(255,150,50,0.35); }
        #selfieBtn  { background: rgba(255,80,180,0.2);   border: 1px solid rgba(255,80,180,0.4); }

        /* ─── INFO BAR ─── */
        #info {
            position: fixed;
            bottom: 22px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.25);
            font-size: 13px;
            pointer-events: none;
            z-index: 5;
            transition: opacity .3s;
        }

        /* ─── UNDO HINT ─── */
        #undoHint {
            position: fixed;
            bottom: 45px;
            right: 16px;
            color: rgba(255,255,255,0.2);
            font-size: 11px;
            pointer-events: none;
            z-index: 5;
        }

        /* ─── NOTIFICATION ─── */
        .notification {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: rgba(15,15,25,0.92);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s, transform .25s;
            text-align: center;
            max-width: 80%;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ─── LOADING ─── */
        .loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            background: rgba(10,10,20,0.95);
            color: white;
            padding: 30px 40px;
            border-radius: 16px;
            font-size: 15px;
            z-index: 160;
            display: none;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .loading.show { display: block; }
        .loading::after {
            content: '';
            display: block;
            width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #00d2ff;
            border-radius: 50%;
            margin: 12px auto 0;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── BOTTOM PANELS ─── */
        .bottom-panel {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            background: rgba(14,14,24,0.97);
            border-top-left-radius: 22px;
            border-top-right-radius: 22px;
            padding: 16px 16px 24px;
            z-index: 50;
            transform: translateY(110%);
            transition: transform .3s cubic-bezier(.4,0,.2,1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.09);
        }
        .bottom-panel.open { transform: translateY(0); }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: white;
        }
        .panel-header h3 { margin: 0; font-size: 15px; }

        .close-panel-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 13px;
        }

        .size-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
        .size-control input[type="range"] {
            flex: 1;
        }
        .size-control span:last-child {
            min-width: 38px;
            text-align: right;
        }

        /* ─── STICKER GRID ─── */
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-height: 38vh;
            overflow-y: auto;
            padding-bottom: 8px;
        }

        .sticker-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform .18s, background .18s;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .sticker-item:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.15);
        }
        .sticker-item img {
            width: 78%;
            height: 78%;
            object-fit: contain;
            pointer-events: none;
        }

        /* ─── EMOJI GRID ─── */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            max-height: 42vh;
            overflow-y: auto;
            padding-bottom: 8px;
        }
        .emoji-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 28px;
            transition: transform .15s, background .15s;
        }
        .emoji-item:active {
            transform: scale(0.88);
            background: rgba(255,255,255,0.18);
        }

        /* ─── BADGES & REMOVE BTN ─── */
        .sticker-badge {
            position: absolute;
            top: 3px; left: 3px;
            background: rgba(0,0,0,0.65);
            color: white;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 2;
        }
        .sticker-remove-btn {
            position: absolute;
            top: 3px; right: 3px;
            background: rgba(220,40,40,0.88);
            border: 1.5px solid rgba(255,255,255,0.8);
            color: white;
            width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            transition: transform .12s, background .12s;
            padding: 0;
            line-height: 1;
        }
        .sticker-remove-btn:active {
            transform: scale(0.82);
            background: rgba(180,0,0,1);
        }

        /* ─── CONFIRM MODAL ─── */
        .confirm-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .confirm-modal.show { display: flex; }
        .confirm-box {
            background: #17172a;
            border-radius: 18px;
            padding: 26px;
            max-width: 320px;
            width: 88%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 16px 50px rgba(0,0,0,0.55);
        }
        .confirm-box h3 { color: white; margin: 0 0 12px; font-size: 16px; }
        .confirm-box p  { color: rgba(255,255,255,0.6); margin: 0 0 18px; font-size: 13px; }
        .confirm-preview {
            width: 96px; height: 96px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 14px;
            border: 2px solid rgba(255,255,255,0.15);
        }
        .confirm-buttons { display: flex; gap: 10px; justify-content: center; }
        .confirm-buttons button {
            padding: 10px 22px;
            border-radius: 20px;
            border: none;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
        }
        .confirm-cancel { background: rgba(255,255,255,0.1); color: white; }
        .confirm-delete { background: rgba(220,40,40,0.92); color: white; }

        /* ─── CAMERA OVERLAY ─── */
        #cameraOverlay {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #cameraOverlay.show { display: flex; }
        #cameraVideo {
            width: 100%; height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
        }
        #cameraFlash {
            position: absolute; inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 202;
            transition: opacity .25s;
        }
        #cameraFlash.flash { opacity: 1; }
        #cameraPreview {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            display: none;
            z-index: 201;
            background: black;
        }
        .camera-top-bar {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 15px;
            padding-top: max(15px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 203;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
        }
        .camera-close-btn, .camera-switch-btn {
            background: rgba(0,0,0,0.5);
            border: none; color: white;
            width: 42px; height: 42px;
            border-radius: 50%;
            font-size: 19px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .camera-title {
            color: white; font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 15px;
        }
        .camera-bottom-bar {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 32px;
            padding-bottom: max(32px, env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 203;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
        }
        .capture-btn {
            width: 76px; height: 76px;
            border-radius: 50%;
            background: white;
            border: 5px solid rgba(255,255,255,0.45);
            box-shadow: 0 0 0 4px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform .1s;
        }
        .capture-btn:active { transform: scale(0.88); }
        .camera-confirm-bar {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 30px;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
            display: none;
            justify-content: space-around;
            align-items: center;
            z-index: 203;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
        }
        .camera-confirm-bar.show { display: flex; }
        .camera-action-btn {
            background: rgba(0,0,0,0.5);
            border: 2px solid white;
            color: white;
            padding: 12px 22px;
            border-radius: 26px;
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
        }
        .camera-action-btn.primary { background: white; color: black; }
        .camera-error {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: white; text-align: center;
            padding: 24px; display: none;
            z-index: 204; max-width: 82%;
        }
        .camera-error.show { display: block; }
        .camera-error h3 { margin: 0 0 10px; font-size: 18px; }
        .camera-error p  { margin: 0 0 16px; opacity: .7; font-size: 13px; }
        .camera-error button {
            background: white; color: black;
            border: none; padding: 10px 22px;
            border-radius: 20px; cursor: pointer; font-size: 14px;
        }

        /* ─── MOBILE OVERRIDES ─── */
        @media (max-width: 768px) {
            .toolbar {
                top: auto;
                bottom: 12px;
                left: 10px;
                right: 10px;
                transform: none;
                max-width: none;
                padding: 6px 10px;
                gap: 5px;
                border-radius: 22px;
            }
            .btn { width: 40px; height: 40px; font-size: 18px; }
            .btn-text { display: none; }
            #sizeSlider { width: 52px; }
            #colorPicker { width: 30px; height: 30px; }
            #info { bottom: 72px; }
            #undoHint { bottom: 80px; }
            #cursorRing { display: none; }
            .sticker-grid { grid-template-columns: repeat(4, 1fr); }
            .emoji-grid { grid-template-columns: repeat(5, 1fr); }
        }
        @media (max-width: 380px) {
            .btn { width: 35px; height: 35px; font-size: 15px; }
            #sizeSlider { width: 42px; }
        }
    </style>
</head>
<body>

    <canvas id="fogCanvas" aria-label="Espace de dessin interactif" role="img"></canvas>
    <div id="cursorRing" aria-hidden="true"></div>

    <!-- TOOLBAR -->
    <div class="toolbar" role="toolbar" aria-label="Outils de dessin">

        <div class="tool-group" title="Taille du pinceau">
            <div id="brushPreview" aria-hidden="true">
                <div id="brushDot"></div>
            </div>
            <input type="range" id="sizeSlider" min="5" max="120" value="25"
                   aria-label="Taille du pinceau">
        </div>

        <div class="tool-sep"></div>

        <div class="tool-group">
            <input type="color" id="colorPicker" value="#d2e6ff" aria-label="Couleur du pinceau">
            <div id="colorDot" aria-hidden="true"></div>
        </div>

        <div class="tool-sep"></div>

        <button id="eraserBtn"   class="btn" title="Gomme (E)"   aria-label="Gomme">🧹</button>
        <button id="undoBtn"     class="btn" title="Annuler (Ctrl+Z)" aria-label="Annuler">↩️</button>

        <div class="tool-sep"></div>

        <button id="stickerBtn"  class="btn" title="Autocollants" aria-label="Autocollants">🏷️</button>
        <button id="galleryBtn"  class="btn" title="Galerie"       aria-label="Ajouter depuis la galerie">🖼️</button>
        <button id="emojiBtn"    class="btn" title="Emojis"        aria-label="Emojis">😀</button>
        <button id="selfieBtn"   class="btn" title="Selfie"        aria-label="Prendre un selfie">📷</button>

        <div class="tool-sep"></div>

        <button id="sendEmailBtn" class="btn" title="Envoyer par email" aria-label="Envoyer par email">📧</button>
        <button id="saveBtn"      class="btn" title="Sauvegarder"        aria-label="Sauvegarder">💾</button>
        <button id="clearBtn"     class="btn" title="Tout effacer"       aria-label="Effacer le dessin">🗑️</button>
    </div>

    <input type="file" id="galleryInput" accept="image/*" multiple style="display:none;">

    <div id="info" aria-live="polite">Dessine ou écris avec ton doigt ✨</div>
    <div id="undoHint" aria-hidden="true">Ctrl+Z pour annuler</div>
    <div id="notification" class="notification" role="status" aria-live="polite"></div>
    <div id="loading"       class="loading" role="status" aria-live="polite">Envoi en cours…</div>

    <!-- CONFIRM DELETE MODAL -->
    <div class="confirm-modal" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <div class="confirm-box">
            <h3 id="confirmTitle">🗑️ Supprimer cette image ?</h3>
            <img id="confirmPreview" class="confirm-preview" alt="Aperçu de l'image à supprimer">
            <p>Cette action est irréversible.</p>
            <div class="confirm-buttons">
                <button class="confirm-cancel" id="confirmCancel">Annuler</button>
                <button class="confirm-delete" id="confirmDelete">Supprimer</button>
            </div>
        </div>
    </div>

    <!-- STICKER PANEL -->
    <div id="stickerPanel" class="bottom-panel" role="dialog" aria-label="Panneau d'autocollants">
        <div class="panel-header">
            <h3>✨ Choisis un autocollant</h3>
            <button class="close-panel-btn" id="closeStickerBtn" aria-label="Fermer">Fermer ✖</button>
        </div>
        <div class="size-control">
            <span>Taille :</span>
            <input type="range" id="stickerSizeSlider" min="50" max="400" value="150" aria-label="Taille de l'autocollant">
            <span id="stickerSizeValue">150px</span>
        </div>
        <div class="sticker-grid" id="stickerGrid"></div>
    </div>

    <!-- EMOJI PANEL -->
    <div id="emojiPanel" class="bottom-panel" role="dialog" aria-label="Panneau d'emojis">
        <div class="panel-header">
            <h3>😀 Choisis un emoji</h3>
            <button class="close-panel-btn" id="closeEmojiBtn" aria-label="Fermer">Fermer ✖</button>
        </div>
        <div class="size-control">
            <span>Taille :</span>
            <input type="range" id="emojiSizeSlider" min="30" max="300" value="80" aria-label="Taille de l'emoji">
            <span id="emojiSizeValue">80px</span>
        </div>
        <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <!-- CAMERA OVERLAY -->
    <div id="cameraOverlay" role="dialog" aria-label="Appareil photo">
        <video id="cameraVideo" autoplay playsinline muted></video>
        <img id="cameraPreview" alt="Photo prise">
        <div id="cameraFlash" aria-hidden="true"></div>
        <div class="camera-top-bar">
            <button class="camera-close-btn" id="cameraCloseBtn" aria-label="Fermer la caméra">✕</button>
            <div class="camera-title" id="cameraTitle">📷 Selfie</div>
            <button class="camera-switch-btn" id="cameraSwitchBtn" aria-label="Changer de caméra">🔄</button>
        </div>
        <div class="camera-bottom-bar" id="cameraBottomBar">
            <button class="capture-btn" id="captureBtn" aria-label="Prendre une photo"></button>
        </div>
        <div class="camera-confirm-bar" id="cameraConfirmBar">
            <button class="camera-action-btn" id="retakeBtn">🔄 Refaire</button>
            <button class="camera-action-btn primary" id="usePhotoBtn">✅ Utiliser</button>
        </div>
        <div class="camera-error" id="cameraError" role="alert">
            <h3>📷 Caméra indisponible</h3>
            <p id="cameraErrorMsg">Impossible d'accéder à la caméra.</p>

    // ════════════════════════════════════════════════════════════
    //  INIT
    // ════════════════════════════════════════════════════════════
    function init() {
        resizeCanvas();
        updateBrushUI();
        generateStickerMenu();
        generateEmojiMenu();
        updateUndoBtn();
    }

    // ════════════════════════════════════════════════════════════
    //  CANVAS RESIZE — ✅ FIX : préserve le dessin
    // ════════════════════════════════════════════════════════════
    function resizeCanvas() {
        // Sauvegarder le contenu actuel
        const snapshot = canvas.width > 0
            ? ctx.getImageData(0, 0, canvas.width, canvas.height)
            : null;

        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;

        // Restaurer le contenu
        if (snapshot) {
            ctx.putImageData(snapshot, 0, 0);
        }

        // Re-appliquer les paramètres (canvas reset à chaque resize)
        applyBrushSettings();
    }

    let resizeDebounce;
    window.addEventListener('resize', () => {
        clearTimeout(resizeDebounce);
        resizeDebounce = setTimeout(resizeCanvas, 150);
    });

    // ════════════════════════════════════════════════════════════
    //  BRUSH SETTINGS
    // ════════════════════════════════════════════════════════════
    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    function applyBrushSettings() {
        if (isErasing) {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth   = currentSize;
            ctx.lineCap     = 'round';
            ctx.lineJoin    = 'round';
            ctx.strokeStyle = 'rgba(0,0,0,1)';
            ctx.shadowBlur  = 0;
        } else {
            ctx.globalCompositeOperation = 'source-over';
            ctx.lineWidth   = currentSize;
            ctx.lineCap     = 'round';
            ctx.lineJoin    = 'round';
            ctx.strokeStyle = hexToRgba(currentColorHex, 0.35);
            ctx.shadowBlur  = currentSize * 0.8;
            ctx.shadowColor = hexToRgba(currentColorHex, 0.9);
        }
    }

    function updateBrushUI() {
        const MAX_DOT = 32;
        const MIN_DOT = 4;
        const dotSize = Math.round(MIN_DOT + (currentSize / 120) * (MAX_DOT - MIN_DOT));
        brushDot.style.width  = dotSize + 'px';
        brushDot.style.height = dotSize + 'px';
        brushDot.style.background = isErasing ? 'rgba(255,255,255,0.5)' : currentColorHex;
        brushDot.style.boxShadow  = isErasing ? 'none' : `0 0 8px ${currentColorHex}`;

        colorDot.style.background = currentColorHex;

        cursorRing.style.width  = Math.max(16, currentSize) + 'px';
        cursorRing.style.height = Math.max(16, currentSize) + 'px';
        cursorRing.style.borderColor = isErasing
            ? 'rgba(255,255,255,0.5)'
            : currentColorHex;
    }

    // ════════════════════════════════════════════════════════════
    //  UNDO SYSTEM
    // ════════════════════════════════════════════════════════════
    function saveSnapshot() {
        undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        if (undoStack.length > MAX_UNDO) undoStack.shift();
        updateUndoBtn();
    }

    function undo() {
        if (undoStack.length === 0) {
            showNotification('⚠️ Rien à annuler');
            return;
        }
        const snap = undoStack.pop();
        ctx.putImageData(snap, 0, 0);
        updateUndoBtn();
        showNotification('↩️ Annulé');
    }

    function updateUndoBtn() {
        undoBtn.style.opacity = undoStack.length === 0 ? '0.4' : '1';
    }

    // Keyboard shortcut
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
        if (e.key === 'e' || e.key === 'E') toggleEraser();
    });

    // ════════════════════════════════════════════════════════════
    //  ERASER
    // ════════════════════════════════════════════════════════════
    function toggleEraser() {
        isErasing = !isErasing;
        applyBrushSettings();
        updateBrushUI();
        eraserBtn.classList.toggle('active-tool', isErasing);
        showNotification(isErasing ? '🧹 Mode gomme activé' : '✏️ Mode dessin activé');
    }
    eraserBtn.addEventListener('click', toggleEraser);

    // ════════════════════════════════════════════════════════════
    //  SLIDER & COLOR EVENTS
    // ════════════════════════════════════════════════════════════
    sizeSlider.addEventListener('input', (e) => {
        currentSize = parseInt(e.target.value);
        applyBrushSettings();
        updateBrushUI();
    });

    colorPicker.addEventListener('input', (e) => {
        currentColorHex = e.target.value;
        if (isErasing) { isErasing = false; eraserBtn.classList.remove('active-tool'); }
        applyBrushSettings();
        updateBrushUI();
    });

    stickerSizeSlider.addEventListener('input', (e) => {
        currentStickerSize = parseInt(e.target.value);
        stickerSizeValue.textContent = currentStickerSize + 'px';

    emojiSizeSlider.addEventListener('input', (e) => {
        currentEmojiSize = parseInt(e.target.value);

    // ════════════════════════════════════════════════════════════
    //  DRAW — ✅ FIX : drawDot corrigé, context sauvegardé
    // ════════════════════════════════════════════════════════════
    function getPos(e) {
        if (e.touches && e.touches.length > 0) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.touches[0].clientX - rect.left,
                y: e.touches[0].clientY - rect.top
            };
        }
        return { x: e.clientX, y: e.clientY };
    }

    function startDraw(e) {
        if (e.target !== canvas) return;
        const pos = getPos(e);

        if (stickerMode) {
            placeSticker(pos.x, pos.y);
            return;
        }

        // Snapshot avant de commencer à dessiner
        saveSnapshot();

        isDrawing = true;
        [lastX, lastY] = [pos.x, pos.y];
        drawDot(pos.x, pos.y);
    }

    function draw(e) {
        if (!isDrawing || stickerMode) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        [lastX, lastY] = [pos.x, pos.y];
    }

    // ✅ FIX : drawDot utilise fillStyle cohérent avec le mode
    function drawDot(x, y) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2);
        if (isErasing) {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0,0,0,1)';
        } else {
            ctx.fillStyle   = hexToRgba(currentColorHex, 0.35);
            ctx.shadowBlur  = currentSize * 0.8;
            ctx.shadowColor = hexToRgba(currentColorHex, 0.9);
        }
        ctx.fill();
        ctx.restore();
        // Re-appliquer après le restore
        applyBrushSettings();
    }

    function endDraw() {
        isDrawing = false;
    }

    // Cursor ring follow (desktop only)
    canvas.addEventListener('mousemove', (e) => {
        cursorRing.style.left = e.clientX + 'px';
        cursorRing.style.top  = e.clientY + 'px';
    });
    canvas.addEventListener('mouseenter', () => { cursorRing.style.opacity = '1'; });
    canvas.addEventListener('mouseleave', () => { cursorRing.style.opacity = '0'; endDraw(); });

    canvas.addEventListener('mousedown',  startDraw);
    canvas.addEventListener('mousemove',  draw);
    canvas.addEventListener('mouseup',    endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: true });
    canvas.addEventListener('touchmove',  draw,      { passive: false });
    canvas.addEventListener('touchend',   endDraw);

    // ════════════════════════════════════════════════════════════
    //  STICKER / EMOJI PLACEMENT — ✅ FIX : sauvegarde context
    // ════════════════════════════════════════════════════════════
    function placeSticker(x, y) {
        if (!activeStickerImg || !stickerMode) return;

        const size = activeStickerImg._type === 'emoji'
            ? (activeStickerImg._emojiSize || currentEmojiSize)
            : currentStickerSize;

        saveSnapshot();

        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        ctx.shadowBlur  = 0;
        ctx.shadowColor = 'transparent';
        ctx.drawImage(activeStickerImg, x - size / 2, y - size / 2, size, size);
        ctx.restore();

        // Re-appliquer les paramètres de brosse
        applyBrushSettings();

        stickerMode      = false;
        activeStickerImg = null;
        showNotification('✅ Ajouté !');
    }

    // ════════════════════════════════════════════════════════════
    //  STICKER MENU
    // ════════════════════════════════════════════════════════════
    function generateStickerMenu() {
        stickerGrid.innerHTML = '';
        stickers.forEach((sticker) => {
            const div = document.createElement('div');
            div.className = 'sticker-item';

            const img = document.createElement('img');
            img.src = sticker.url;
            img.alt = sticker.name;
            img.crossOrigin = 'Anonymous';
            img.onerror = () => {
                div.style.background = 'rgba(255,0,0,0.15)';
                div.innerHTML = '<span style="color:rgba(255,255,255,0.4);font-size:10px;">❌</span>';
            };

            div.appendChild(img);
            div.addEventListener('click', () => selectSticker(img));
            stickerGrid.appendChild(div);
        });
        renderGalleryStickers();
    }

    function renderGalleryStickers() {
        const old = document.getElementById('gallerySection');
        if (old) old.remove();
        if (galleryImages.length === 0) return;

        const section = document.createElement('div');
        section.id = 'gallerySection';
        section.style.cssText = 'grid-column:1/-1;margin-top:12px;border-top:1px solid rgba(255,255,255,0.08);padding-top:12px;';

        const title = document.createElement('p');
        title.style.cssText = 'color:rgba(255,255,255,0.45);font-size:11px;margin:0 0 10px;';
        title.textContent = `📁 Mes images (${galleryImages.length})`;
        section.appendChild(title);

        const grid = document.createElement('div');
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:10px;';

        galleryImages.forEach((imgData, index) => {
            const div = document.createElement('div');
            div.className = 'sticker-item';

            const img = document.createElement('img');
            img.src = imgData.dataUrl;
            img.alt = `${imgData.type}-${index}`;
            div.appendChild(img);

            const badge = document.createElement('span');
            badge.className = 'sticker-badge';
            badge.textContent = imgData.type === 'selfie' ? '📷' : '🖼️';
            div.appendChild(badge);

            const removeBtn = document.createElement('button');
            removeBtn.className = 'sticker-remove-btn';
            removeBtn.textContent = '✖';
            removeBtn.title = 'Supprimer';
            removeBtn.setAttribute('aria-label', 'Supprimer cette image');
            removeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openDeleteConfirmation(index);
            });
            div.appendChild(removeBtn);

            div.addEventListener('click', () => selectSticker(img));
            grid.appendChild(div);
        });

        section.appendChild(grid);
        stickerGrid.appendChild(section);
    }

    function selectSticker(imgElement) {
        activeStickerImg = imgElement;
        activeStickerImg._type = 'image';
        stickerMode = true;
        stickerPanel.classList.remove('open');
        showNotification('📍 Touche l\'écran pour placer !');
    }

    // ════════════════════════════════════════════════════════════
    //  EMOJI MENU — ✅ FIX : cache des emojis rendus
    // ════════════════════════════════════════════════════════════
    function generateEmojiMenu() {
        emojiGrid.innerHTML = '';
        Object.entries(emojiCategories).forEach(([category, emojis]) => {
            const catTitle = document.createElement('div');
            catTitle.style.cssText = 'grid-column:1/-1;color:rgba(255,255,255,0.35);font-size:11px;padding:4px 0 2px 4px;';
            catTitle.textContent = category;
            emojiGrid.appendChild(catTitle);

            emojis.forEach(emoji => {
                const div = document.createElement('div');
                div.className = 'emoji-item';
                div.textContent = emoji;
                div.setAttribute('role', 'button');
                div.setAttribute('aria-label', emoji);
                div.addEventListener('click', () => selectEmoji(emoji));
                emojiGrid.appendChild(div);
            });
        });
    }

    function selectEmoji(emoji) {
        const cacheKey = `${emoji}_${currentEmojiSize}`;

        if (emojiCache.has(cacheKey)) {
            const cached = emojiCache.get(cacheKey);
            activeStickerImg = cached;
            stickerMode = true;
            emojiPanel.classList.remove('open');
            showNotification('📍 Touche l\'écran pour placer l\'emoji !');
            return;
        }

        const size = currentEmojiSize * 2;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width  = size;
        tempCanvas.height = size;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.font          = `${size * 0.85}px serif`;
        tempCtx.textAlign     = 'center';
        tempCtx.textBaseline  = 'middle';
        tempCtx.fillText(emoji, size / 2, size / 2);

        const img = new Image();
        img.src      = tempCanvas.toDataURL();
        img._type    = 'emoji';
        img._emojiSize = currentEmojiSize;

        img.onload = () => {
            emojiCache.set(cacheKey, img);
            activeStickerImg = img;
            stickerMode = true;
            emojiPanel.classList.remove('open');
            showNotification('📍 Touche l\'écran pour placer l\'emoji !');
        };
    }

    // ════════════════════════════════════════════════════════════
    //  GALLERY INPUT
    // ════════════════════════════════════════════════════════════
    galleryBtn.addEventListener('click', () => galleryInput.click());

    galleryInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files || []).filter(f => f.type.startsWith('image/'));
        if (files.length === 0) return;

        let loaded = 0;
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                galleryImages.push({ dataUrl: ev.target.result, type: 'gallery' });
                if (++loaded >= files.length) {
                    renderGalleryStickers();
                    showNotification(`✅ ${loaded} image(s) ajoutée(s) !`);
                    stickerPanel.classList.add('open');
                }
            };
            reader.readAsDataURL(file);
        });
        galleryInput.value = '';
    });

    // ════════════════════════════════════════════════════════════
    //  PANEL TOGGLES
    // ════════════════════════════════════════════════════════════
    function closeAllPanels() {
        stickerPanel.classList.remove('open');
        emojiPanel.classList.remove('open');
    }

    stickerBtn.addEventListener('click', () => {
        const isOpen = stickerPanel.classList.contains('open');
        closeAllPanels();
        if (!isOpen) stickerPanel.classList.add('open');
    });
    closeStickerBtn.addEventListener('click', () => {
        stickerPanel.classList.remove('open');
        stickerMode = false;
    });

    emojiBtn.addEventListener('click', () => {
        const isOpen = emojiPanel.classList.contains('open');
        closeAllPanels();
        if (!isOpen) emojiPanel.classList.add('open');
    });
    closeEmojiBtn.addEventListener('click', () => {
        emojiPanel.classList.remove('open');
        stickerMode = false;
    });

    // ════════════════════════════════════════════════════════════
    //  CONFIRM DELETE MODAL
    // ════════════════════════════════════════════════════════════
    function openDeleteConfirmation(index) {
        pendingDeleteIndex = index;
        confirmPreview.src = galleryImages[index].dataUrl;
        confirmModal.classList.add('show');
    }
    function closeDeleteConfirmation() {
        pendingDeleteIndex = null;
        confirmModal.classList.remove('show');
    }
    function confirmDeleteImage() {
        if (pendingDeleteIndex === null) return;
        const removed = galleryImages.splice(pendingDeleteIndex, 1)[0];
        renderGalleryStickers();
        closeDeleteConfirmation();
        showNotification(`🗑️ ${removed.type === 'selfie' ? 'Selfie' : 'Image'} supprimé(e)`);
    }
    confirmCancel.addEventListener('click', closeDeleteConfirmation);
    confirmDelete.addEventListener('click', confirmDeleteImage);
    confirmModal.addEventListener('click', (e) => { if (e.target === confirmModal) closeDeleteConfirmation(); });

    // ════════════════════════════════════════════════════════════
    //  UNDO & CLEAR & SAVE & EMAIL
    // ════════════════════════════════════════════════════════════
    undoBtn.addEventListener('click', undo);

    clearBtn.addEventListener('click', () => {
        saveSnapshot();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        applyBrushSettings();
        showNotification('🗑️ Canvas effacé');
    });

    saveBtn.addEventListener('click', () => {
        const tmp = document.createElement('canvas');
        tmp.width  = canvas.width;
        tmp.height = canvas.height;
        const tc   = tmp.getContext('2d');
        tc.fillStyle = '#0a0a12';
        tc.fillRect(0, 0, tmp.width, tmp.height);
        tc.drawImage(canvas, 0, 0);
        const link = document.createElement('a');
        link.download = `dessin-brouillard-${Date.now()}.png`;
        link.href = tmp.toDataURL('image/png');
        link.click();
        showNotification('✅ Image sauvegardée !');
    });

    sendEmailBtn.addEventListener('click', async () => {
        loading.classList.add('show');
        try {
            const tmp = document.createElement('canvas');
            const maxW = 800, maxH = 600;
            let w = canvas.width, h = canvas.height;
            if (w > maxW) { h = (h * maxW) / w; w = maxW; }
            if (h > maxH) { w = (w * maxH) / h; h = maxH; }
            tmp.width = w; tmp.height = h;
            const tc = tmp.getContext('2d');
            tc.fillStyle = '#0a0a12';
            tc.fillRect(0, 0, w, h);
            tc.drawImage(canvas, 0, 0, w, h);

            const base64 = tmp.toDataURL('image/jpeg', 0.72).split(',')[1];
            await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                to_email:   TO_EMAIL,
                message:    'Nouveau dessin brouillard !',
                image:      base64,
                image_name: `dessin-${Date.now()}.jpg`
            });
            showNotification('✅ Email envoyé avec succès !');
        } catch (err) {
            showNotification('❌ Erreur : ' + (err.text || err.message || 'inconnue'));
        } finally {
            loading.classList.remove('show');
        }
    });

    // ════════════════════════════════════════════════════════════
    //  CAMERA
    // ════════════════════════════════════════════════════════════
    async function startCamera(facingMode = 'user') {
        stopCamera();
        cameraError.classList.remove('show');
        cameraVideo.style.display = 'block';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });
            currentStream = stream;
            cameraVideo.srcObject = stream;
            cameraVideo.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            cameraTitle.textContent = facingMode === 'user' ? '📷 Selfie' : '📷 Caméra arrière';
        } catch (err) {
            cameraVideo.style.display = 'none';
            let msg = 'Impossible d\'accéder à la caméra.';
            if      (err.name === 'NotAllowedError')    msg = 'Permission refusée. Autorise la caméra dans les paramètres.';
            else if (err.name === 'NotFoundError')      msg = 'Aucune caméra détectée.';
            else if (err.name === 'NotReadableError')   msg = 'La caméra est déjà utilisée par une autre app.';
            else if (err.name === 'OverconstrainedError') {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    currentStream = s;
                    cameraVideo.srcObject = s;
                    cameraVideo.style.transform = 'scaleX(1)';
                    cameraTitle.textContent = '📷 Caméra';
                    return;
                } catch { /* fall through */ }
            }
            cameraErrorMsg.textContent = msg;
            cameraError.classList.add('show');
        }
    }

    function stopCamera() {
        currentStream?.getTracks().forEach(t => t.stop());
        currentStream = null;
        cameraVideo.srcObject = null;
    }

    function openCamera() {
        cameraOverlay.classList.add('show');
        cameraPreview.style.display = 'none';
        cameraBottomBar.style.display = 'flex';
        cameraConfirmBar.classList.remove('show');
        capturedPhotoDataUrl = null;
        currentFacingMode = 'user';
        startCamera(currentFacingMode);
    }

    function closeCamera() {
        cameraOverlay.classList.remove('show');
        stopCamera();
        cameraPreview.style.display = 'none';
        cameraBottomBar.style.display = 'flex';
        cameraConfirmBar.classList.remove('show');
        capturedPhotoDataUrl = null;
    }

    function capturePhoto() {
        if (!currentStream) return;
        cameraFlash.classList.add('flash');
        setTimeout(() => cameraFlash.classList.remove('flash'), 250);

        const cap = document.createElement('canvas');
        cap.width  = cameraVideo.videoWidth;
        cap.height = cameraVideo.videoHeight;
        const cc   = cap.getContext('2d');
        if (currentFacingMode === 'user') {
            cc.translate(cap.width, 0);
            cc.scale(-1, 1);
        }
        cc.drawImage(cameraVideo, 0, 0, cap.width, cap.height);
        capturedPhotoDataUrl = cap.toDataURL('image/jpeg', 0.85);

        cameraPreview.src  = capturedPhotoDataUrl;
        cameraPreview.style.display  = 'block';
        cameraBottomBar.style.display = 'none';
        cameraConfirmBar.classList.add('show');
        stopCamera();
    }

    function retakePhoto() {
        capturedPhotoDataUrl = null;
        cameraPreview.style.display  = 'none';
        cameraBottomBar.style.display = 'flex';
        cameraConfirmBar.classList.remove('show');
        startCamera(currentFacingMode);
    }

    function usePhoto() {
        if (!capturedPhotoDataUrl) return;
        galleryImages.push({ dataUrl: capturedPhotoDataUrl, type: 'selfie' });
        renderGalleryStickers();

        const img = new Image();
        img.src   = capturedPhotoDataUrl;
        img._type = 'image';
        img.onload = () => {
            activeStickerImg = img;
            stickerMode = true;
            closeCamera();
            showNotification('📍 Touche l\'écran pour placer ta photo !');
        };
    }

    selfieBtn.addEventListener('click', () => {
        if (!navigator.mediaDevices?.getUserMedia) {
            showNotification('❌ Caméra non supportée sur cet appareil');
            return;
        }
        openCamera();
    });

    cameraCloseBtn.addEventListener('click', closeCamera);
    cameraSwitchBtn.addEventListener('click', () => {
        currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
        startCamera(currentFacingMode);
    });
    captureBtn.addEventListener('click', capturePhoto);
    retakeBtn.addEventListener('click', retakePhoto);
    usePhotoBtn.addEventListener('click', usePhoto);
    cameraErrorClose.addEventListener('click', closeCamera);

    // Empêcher la propagation du toucher sur les overlays
    [cameraOverlay, stickerPanel, emojiPanel, confirmModal].forEach(el => {
        el.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
        el.addEventListener('touchmove',  e => e.stopPropagation(), { passive: false });
    });

    // ════════════════════════════════════════════════════════════
    //  NOTIFICATION — ✅ FIX : timer propre pour éviter les chevauchements
    // ════════════════════════════════════════════════════════════
    function showNotification(message) {
        if (notifTimer) clearTimeout(notifTimer);
        notification.textContent = message;
        notification.classList.add('show');
        notifTimer = setTimeout(() => {
            notification.classList.remove('show');
            notifTimer = null;
        }, 2800);
    }

    // ════════════════════════════════════════════════════════════
    //  START
    // ════════════════════════════════════════════════════════════
    init();
    </script>
</body>
</html>
