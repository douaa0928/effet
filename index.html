<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dessiner avec du Brouillard</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a12; 
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: sans-serif;
        }

        canvas {
            display: block;
        }

        .toolbar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(30, 30, 45, 0.7);
            padding: 8px 12px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95%;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tool-label {
            color: rgba(255,255,255,0.7);
            font-size: 11px;
        }

        #sizeSlider {
            width: 60px;
            accent-color: #00d2ff;
            cursor: pointer;
        }

        #colorPicker {
            width: 25px;
            height: 25px;
            border: none;
            border-radius: 50%;
            background: none;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }
        #colorPicker::-webkit-color-swatch-wrapper { padding: 0; }
        #colorPicker::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; }

        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        #clearBtn { background: rgba(255, 80, 80, 0.2); color: white; border: 1px solid rgba(255, 80, 80, 0.4); }
        #clearBtn:active { background: rgba(255, 80, 80, 0.5); }

        #saveBtn { background: rgba(80, 255, 120, 0.2); color: white; border: 1px solid rgba(80, 255, 120, 0.4); }
        #saveBtn:active { background: rgba(80, 255, 120, 0.5); }

        #sendEmailBtn { background: rgba(100, 150, 255, 0.3); color: white; border: 1px solid rgba(100, 150, 255, 0.6); }
        #sendEmailBtn:active { background: rgba(100, 150, 255, 0.6); }
        
        #stickerBtn { background: rgba(255, 200, 50, 0.2); color: white; border: 1px solid rgba(255, 200, 50, 0.4); }
        #stickerBtn:active { background: rgba(255, 200, 50, 0.5); }

        #info {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            pointer-events: none;
            z-index: 5;
        }

        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            text-align: center;
            max-width: 80%;
        }
        .notification.show { opacity: 1; }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 40px;
            border-radius: 10px;
            font-size: 16px;
            z-index: 100;
            display: none;
        }
        .loading.show { display: block; }

        /* --- STYLE DU MENU AUTOCOLLANTS --- */
        #stickerPanel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 30, 0.95);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 15px;
            z-index: 50;
            transform: translateY(110%);
            transition: transform 0.3s ease-out;
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        #stickerPanel.open {
            transform: translateY(0);
        }

        .sticker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: white;
        }
        .sticker-header h3 { margin: 0; font-size: 16px; }
        .close-stickers {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-height: 40vh;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .sticker-item {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            overflow: hidden;
        }
        .sticker-item:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.2);
        }
        .sticker-item img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="fogCanvas"></canvas>

    <div class="toolbar">
        <div class="tool-group">
            <span class="tool-label">Taille</span>
            <input type="range" id="sizeSlider" min="5" max="120" value="25">
        </div>
        
        <div class="tool-group">
            <span class="tool-label">Couleur</span>
            <input type="color" id="colorPicker" value="#d2e6ff">
        </div>
        
        <button id="stickerBtn" class="btn">🏷️ Autocollants</button>
        <button id="sendEmailBtn" class="btn">📧 Envoyer</button>
        <button id="saveBtn" class="btn">💾 Sauvegarder</button>
        <button id="clearBtn" class="btn">🗑️ Effacer</button>
    </div>

    <div id="info">Dessine ou écris avec ton doigt ✨</div>
    <div id="notification" class="notification"></div>
    <div id="loading" class="loading"> Envoi en cours...</div>

    <!-- MENU AUTOCOLLANTS -->
    <div id="stickerPanel">
        <div class="sticker-header">
            <h3>✨ Choisis un autocollant</h3>
            <button class="close-stickers" id="closeStickerBtn">Fermer ✖</button>
        </div>
        <div class="sticker-grid" id="stickerGrid">
            <!-- Les autocollants seront générés ici par le code JS -->
        </div>
    </div>

    <script type="text/javascript">
        // --- CONFIGURATION EMAILJS ---
        emailjs.init("2HSpDxF3uZuAKH-l");
        const SERVICE_ID = "service_ctymr5f";
        const TEMPLATE_ID = "template_wc1x8ag";
        const TO_EMAIL = "insim5628@gmail.com";

        // --- VARIABLES GLOBALES ---
        const canvas = document.getElementById('fogCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        const sendEmailBtn = document.getElementById('sendEmailBtn');
        const stickerBtn = document.getElementById('stickerBtn');
        const stickerPanel = document.getElementById('stickerPanel');
        const closeStickerBtn = document.getElementById('closeStickerBtn');
        const stickerGrid = document.getElementById('stickerGrid');
        const sizeSlider = document.getElementById('sizeSlider');
        const colorPicker = document.getElementById('colorPicker');
        const notification = document.getElementById('notification');
        const loading = document.getElementById('loading');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let currentSize = 25;
        let currentColorHex = '#d2e6ff';

        // --- AUTOCOLLANTS ---
        let activeStickerImg = null;
        let stickerMode = false;
        
        // ✅ LISTE DES AUTOCOLLANTS - CHEMINS RELATIFS
        const stickers = [
            { name: "d1", url: "douaa1.png" },
            { name: "dou7", url: "dou7.png" },
            { name: "dou2", url: "dou2.png" },
            { name: "dou8", url: "dou8.png" },
            { name: "dou6", url: "dou6.png" },
            { name: "dou4", url: "dou4.png" },
            { name: "dou5", url: "dou5.png" },
            { name: "dou3", url: "dou3.png" },
            { name: "lion1", url: "liondou.png" },
            { name: "lion", url: "liondo.png" },
        ];

        // Initialisation
        function init() {
            resizeCanvas();
            applyBrushSettings();
            generateStickerMenu();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function applyBrushSettings() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = hexToRgba(currentColorHex, 0.35);
            ctx.shadowBlur = currentSize * 0.8;
            ctx.shadowColor = hexToRgba(currentColorHex, 0.9);
        }

        sizeSlider.addEventListener('input', (e) => {
            currentSize = parseInt(e.target.value);
            applyBrushSettings();
        });

        colorPicker.addEventListener('input', (e) => {
            currentColorHex = e.target.value;
            applyBrushSettings();
        });

        // --- GESTION DES AUTOCOLLANTS ---
        function generateStickerMenu() {
            stickerGrid.innerHTML = '';
            stickers.forEach((sticker, index) => {
                const div = document.createElement('div');
                div.className = 'sticker-item';
                
                const img = document.createElement('img');
                img.src = sticker.url;
                img.alt = sticker.name;
                img.crossOrigin = "Anonymous";
                
                // Gestion d'erreur si l'image ne charge pas
                img.onerror = function() {
                    console.error('Image non trouvée:', sticker.url);
                    div.style.background = 'rgba(255,0,0,0.2)';
                    div.innerHTML = '<span style="color: white; font-size: 10px;">❌</span>';
                };
                
                div.appendChild(img);
                
                div.addEventListener('click', () => {
                    selectSticker(img);
                });
                
                stickerGrid.appendChild(div);
            });
        }

        function selectSticker(imgElement) {
            activeStickerImg = imgElement;
            stickerMode = true;
            stickerPanel.classList.remove('open');
            showNotification('📍 Touche l\'écran pour placer !');
        }

        function placeSticker(x, y) {
            if (!activeStickerImg || !stickerMode) return;

            const size = 150; // Taille de l'autocollant
            const ctxBackup = ctx.globalCompositeOperation;
            const shadowBackup = ctx.shadowBlur;
            const strokeBackup = ctx.strokeStyle;
            const shadowColorBackup = ctx.shadowColor;

            // Reset settings for drawing image cleanly
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'transparent';

            // Draw image centered on touch
            ctx.drawImage(activeStickerImg, x - size/2, y - size/2, size, size);

            // Restore settings
            ctx.globalCompositeOperation = ctxBackup;
            ctx.shadowBlur = shadowBackup;
            ctx.strokeStyle = strokeBackup;
            ctx.shadowColor = shadowColorBackup;

            stickerMode = false;
            activeStickerImg = null;
            showNotification('✅ Autocollant ajouté !');
        }

        // --- EVENTS AUTOCOLLANTS ---
        stickerBtn.addEventListener('click', () => {
            stickerPanel.classList.add('open');
        });

        closeStickerBtn.addEventListener('click', () => {
            stickerPanel.classList.remove('open');
            stickerMode = false;
        });

        // --- DESSIN ET PLACEMENT ---
        function getPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function startDraw(e) {
            if (e.target !== canvas && !e.target.classList.contains('sticker-item')) return;
            
            const pos = getPos(e);
            
            // Si mode autocollant actif
            if (stickerMode) {
                placeSticker(pos.x, pos.y);
                return;
            }

            isDrawing = true;
            [lastX, lastY] = [pos.x, pos.y];
            drawDot(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing || stickerMode) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            [lastX, lastY] = [pos.x, pos.y];
        }

        function drawDot(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2);
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fill();
        }

        function endDraw() {
            isDrawing = false;
        }

        function showNotification(message) {
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // --- EMAIL & SAVE ---
        sendEmailBtn.addEventListener('click', async () => {
            loading.classList.add('show');
            try {
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                const maxWidth = 800;
                const maxHeight = 600;
                let width = canvas.width;
                let height = canvas.height;
                if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; }
                tempCanvas.width = width;
                tempCanvas.height = height;
                tempCtx.fillStyle = '#0a0a12';
                tempCtx.fillRect(0, 0, width, height);
                tempCtx.drawImage(canvas, 0, 0, width, height);
                
                const compressedDataUrl = tempCanvas.toDataURL('image/jpeg', 0.7);
                const base64Image = compressedDataUrl.split(',')[1];
                
                const templateParams = {
                    to_email: TO_EMAIL,
                    message: 'Nouveau dessin brouillard !',
                    image: base64Image,
                    image_name: `dessin-${Date.now()}.jpg`
                };
                
                await emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams);
                loading.classList.remove('show');
                showNotification('✅ Email envoyé !');
            } catch (error) {
                loading.classList.remove('show');
                showNotification('❌ Erreur: ' + (error.text || error.message));
            }
        });

        saveBtn.addEventListener('click', async () => {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.fillStyle = '#0a0a12';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0);
            const dataURL = tempCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `dessin-brouillard-${Date.now()}.png`;
            link.href = dataURL;
            link.click();
            showNotification('✅ Sauvegardé !');
        });

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            applyBrushSettings();
            showNotification('🗑️ Effacé');
        });

        // Touch listeners
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseout', endDraw);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', endDraw);

        // Prevent button clicks from drawing
        document.querySelectorAll('.btn, .sticker-item, .close-stickers, input').forEach(el => {
            el.addEventListener('touchstart', (e) => e.stopPropagation());
        });

        init();
    </script>
</body>
</html>
