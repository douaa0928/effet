<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dessiner avec du Brouillard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a12; 
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: sans-serif;
        }

        canvas {
            display: block;
        }

        /* Barre d'outils en haut */
        .toolbar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(30, 30, 45, 0.7);
            padding: 10px 15px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .tool-label {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-right: -5px;
        }

        /* Style du curseur de taille */
        #sizeSlider {
            width: 80px;
            accent-color: #00d2ff;
            cursor: pointer;
        }

        /* Style du sélecteur de couleur */
        #colorPicker {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 50%;
            background: none;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }
        #colorPicker::-webkit-color-swatch-wrapper { padding: 0; }
        #colorPicker::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; }

        /* Bouton Effacer */
        #clearBtn {
            padding: 8px 12px;
            background: rgba(255, 80, 80, 0.2);
            color: white;
            border: 1px solid rgba(255, 80, 80, 0.4);
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #clearBtn:active {
            background: rgba(255, 80, 80, 0.5);
        }
        
        /* Petit texte d'instruction */
        #info {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="fogCanvas"></canvas>

    <div class="toolbar">
        <span class="tool-label">Taille</span>
        <input type="range" id="sizeSlider" min="5" max="120" value="25">
        
        <span class="tool-label">Couleur</span>
        <input type="color" id="colorPicker" value="#d2e6ff">
        
        <button id="clearBtn">🗑️ Effacer</button>
    </div>

    <div id="info">Dessine ou écris avec ton doigt ✨</div>

    <script>
        const canvas = document.getElementById('fogCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const sizeSlider = document.getElementById('sizeSlider');
        const colorPicker = document.getElementById('colorPicker');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        
        // Variables pour la taille et la couleur actuelles
        let currentSize = 25;
        let currentColorHex = '#d2e6ff';

        // Ajuster la taille du canvas à l'écran
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Convertir la couleur HEX du picker en RGBA pour la transparence du brouillard
        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // Appliquer les réglages du pinceau
        function applyBrushSettings() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Couleur du trait (transparente pour l'effet brume)
            ctx.strokeStyle = hexToRgba(currentColorHex, 0.35); 
            
            // Effet de lueur (shadow) pour le côté vaporeux
            ctx.shadowBlur = currentSize * 0.8; 
            ctx.shadowColor = hexToRgba(currentColorHex, 0.9);
        }

        applyBrushSettings();

        // Mettre à jour quand on change la taille
        sizeSlider.addEventListener('input', (e) => {
            currentSize = parseInt(e.target.value);
            applyBrushSettings();
        });

        // Mettre à jour quand on change la couleur
        colorPicker.addEventListener('input', (e) => {
            currentColorHex = e.target.value;
            applyBrushSettings();
        });

        // Récupérer la position du doigt ou de la souris
        function getPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function startDraw(e) {
            // Sécurité : ne pas dessiner si on touche la barre d'outils
            if (e.target !== canvas) return; 
            
            isDrawing = true;
            const pos = getPos(e);
            [lastX, lastY] = [pos.x, pos.y];
            drawDot(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); 

            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();

            [lastX, lastY] = [pos.x, pos.y];
        }

        function drawDot(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, ctx.lineWidth / 2, 0, Math.PI * 2);
            ctx.fillStyle = ctx.strokeStyle; // Utiliser la même couleur que le trait
            ctx.fill();
        }

        function endDraw() {
            isDrawing = false;
        }

        // Effacer tout l'écran
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            applyBrushSettings(); 
        });
        // Empêcher le bouton de déclencher le dessin
        clearBtn.addEventListener('touchstart', (e) => e.stopPropagation());

        // Écouteurs pour la souris (PC)
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseout', endDraw);

        // Écouteurs pour le tactile (Téléphone)
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', endDraw);
    </script>
</body>
</html>
